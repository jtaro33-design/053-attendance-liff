<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>053academy 管理ハブ</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --line:#d9e2ec;
      --text:#1f2937;
      --sub:#5b6472;
      --green:#1f7a4f;
      --blue:#1d4ed8;
      --blue-soft:#e8f0ff;
      --red:#b42318;
      --red-soft:#feeceb;
      --orange:#b54708;
      --orange-soft:#fff4e5;
      --shadow:0 4px 14px rgba(15,23,42,0.06);
      --radius:18px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Segoe UI",sans-serif;
      font-size:18px;
      line-height:1.65;
    }

    .wrap{
      width:min(1100px, calc(100% - 24px));
      margin:0 auto;
      padding:18px 0 40px;
    }

    .page-title{
      font-size:32px;
      font-weight:800;
      margin:8px 0 8px;
    }

    .page-sub{
      color:var(--sub);
      margin:0 0 18px;
      font-size:17px;
    }

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:14px;
      margin-bottom:18px;
    }

    .summary-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px 16px;
      min-height:120px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:flex-start;
    }

    .summary-label{
      font-size:16px;
      color:var(--sub);
      margin-bottom:6px;
      font-weight:700;
    }

    .summary-value{
      font-size:34px;
      line-height:1.1;
      font-weight:800;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:18px;
    }

    .card-title{
      font-size:25px;
      font-weight:800;
      margin:0 0 14px;
    }

    .muted{
      color:var(--sub);
      font-size:16px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .list{
      display:grid;
      gap:12px;
    }

    .item{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      background:#fff;
    }

    .item-title{
      font-size:20px;
      font-weight:800;
      margin-bottom:4px;
    }

    .item-sub{
      color:var(--sub);
      font-size:16px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .badge-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      min-height:34px;
      padding:6px 12px;
      border-radius:999px;
      font-size:15px;
      font-weight:800;
      background:#eef2f7;
      color:#334155;
    }

    .badge.green{ background:#e8f7ef; color:var(--green); }
    .badge.blue{ background:var(--blue-soft); color:var(--blue); }
    .badge.red{ background:var(--red-soft); color:var(--red); }
    .badge.orange{ background:var(--orange-soft); color:var(--orange); }

    .section-space{
      margin-top:10px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:14px;
    }

    .label{
      font-size:17px;
      font-weight:800;
    }

    input[type="text"],
    select,
    textarea{
      width:100%;
      min-height:56px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      font-size:18px;
      color:var(--text);
      padding:14px 16px;
    }

    textarea{
      min-height:180px;
      resize:vertical;
    }

    .inline-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:8px;
    }

    button{
      min-height:60px;
      border:none;
      border-radius:16px;
      padding:14px 16px;
      font-size:18px;
      font-weight:800;
      cursor:pointer;
    }

    .btn-primary{
      background:var(--blue);
      color:#fff;
    }

    .btn-soft{
      background:var(--blue-soft);
      color:var(--blue);
      border:1px solid #c7d7ff;
    }

    .btn-danger{
      background:var(--red-soft);
      color:var(--red);
      border:1px solid #f8c9c4;
    }

    .mode-row{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-bottom:16px;
    }

    .mode-btn{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }

    .mode-btn.active{
      background:var(--blue);
      color:#fff;
      border-color:var(--blue);
    }

    .hidden{
      display:none !important;
    }

    .check-list{
      display:grid;
      gap:12px;
      margin-top:8px;
    }

    .check-item{
      display:flex;
      align-items:flex-start;
      gap:14px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#f8fbff;
      padding:14px 16px;
    }

    .check-item input[type="checkbox"]{
      width:30px;
      height:30px;
      margin-top:2px;
      flex:0 0 30px;
      accent-color:var(--blue);
    }

    .check-text{
      font-size:17px;
      font-weight:800;
    }

    .status-box,
    .preview-box,
    .log-box{
      min-height:92px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      padding:14px;
    }

    .status-box.ok{ color:var(--green); font-weight:800; }
    .status-box.error{ color:var(--red); font-weight:800; }
    .status-box.warn{ color:var(--orange); font-weight:800; }

    .participant-group{
      margin-top:10px;
      padding-top:10px;
      border-top:1px solid #eef2f7;
    }

    .participant-title{
      font-size:16px;
      font-weight:800;
      margin-bottom:4px;
    }

    .small{
      font-size:15px;
      color:var(--sub);
    }

    @media (max-width: 900px){
      .summary-grid,
      .grid-2,
      .inline-2,
      .actions,
      .mode-row{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="page-title">053academy 管理ハブ</h1>
    <p class="page-sub">現行GASにそのまま接続する安定版です。勝手な仕様拡張はしていません。</p>

    <section class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">会員申請</div>
        <div id="summaryMemberCount" class="summary-value">-</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">無料体験</div>
        <div id="summaryTrialCount" class="summary-value">-</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">今後4週間の練習</div>
        <div id="summaryPracticeCount" class="summary-value">-</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">今後のイベント</div>
        <div id="summaryEventCount" class="summary-value">-</div>
      </div>
    </section>

    <section class="grid-2">
      <div class="card">
        <h2 class="card-title">会員申請</h2>
        <div id="memberApplications" class="list"></div>
      </div>

      <div class="card">
        <h2 class="card-title">無料体験申請</h2>
        <div id="trialApplications" class="list"></div>
      </div>
    </section>

    <section class="card">
      <h2 class="card-title">今後4週間の練習</h2>
      <div id="adminPractices" class="list"></div>
    </section>

    <section class="card">
      <h2 class="card-title">今後のイベント</h2>
      <div id="adminEvents" class="list"></div>
    </section>

    <section class="card">
      <h2 class="card-title">個別連絡</h2>

      <div class="mode-row">
        <button type="button" class="mode-btn active" data-mode="direct" onclick="setMessageMode('direct')">個人指定</button>
        <button type="button" class="mode-btn" data-mode="practice" onclick="setMessageMode('practice')">練習ごと</button>
        <button type="button" class="mode-btn" data-mode="event" onclick="setMessageMode('event')">イベントごと</button>
      </div>

      <input type="hidden" id="messageMode" value="direct">

      <div id="directFields">
        <div class="inline-2">
          <div class="field">
            <label class="label" for="lineUserId">LINE userID</label>
            <input type="text" id="lineUserId" placeholder="Uから始まるLINE userID">
          </div>
          <div class="field">
            <label class="label" for="childName">子ども氏名</label>
            <input type="text" id="childName" placeholder="例：中西　絃一朗">
          </div>
        </div>

        <div class="field">
          <label class="label" for="category">区分</label>
          <input type="text" id="category" placeholder="例：管理確認 / クラブ / スクール / 一般">
        </div>
      </div>

      <div id="practiceFields" class="hidden">
        <div class="field">
          <label class="label" for="practiceId">練習ID</label>
          <input type="text" id="practiceId" placeholder="32文字のpracticeId">
        </div>
      </div>

      <div id="eventFields" class="hidden">
        <div class="field">
          <label class="label" for="eventPageId">イベントPage ID</label>
          <input type="text" id="eventPageId" placeholder="32文字のeventPageId">
        </div>
      </div>

      <div class="field">
        <label class="label" for="messageText">本文</label>
        <textarea id="messageText" placeholder="送信するメッセージ本文を入力してください"></textarea>
      </div>

      <div class="check-list">
        <label class="check-item">
          <input type="checkbox" id="check1">
          <span class="check-text">送信対象と宛先プレビュー内容を確認しました</span>
        </label>
        <label class="check-item">
          <input type="checkbox" id="check2">
          <span class="check-text">本文に誤字・誤送信リスクがないことを確認しました</span>
        </label>
        <label class="check-item">
          <input type="checkbox" id="check3">
          <span class="check-text">これは実送信であり、取り消せないことを理解しました</span>
        </label>
      </div>

      <div class="actions section-space">
        <button type="button" class="btn-soft" onclick="previewRecipients()">宛先プレビュー取得</button>
        <button type="button" class="btn-soft" onclick="loadDirectLogs()">送信ログ再読込</button>
      </div>

      <div class="actions">
        <button type="button" class="btn-soft" onclick="sendDirectMessage(true)">dryRun送信</button>
        <button type="button" class="btn-danger" onclick="sendDirectMessage(false)">本番送信</button>
      </div>

      <div class="field section-space">
        <label class="label">状態</label>
        <div id="statusBox" class="status-box">待機中です。</div>
      </div>

      <div class="field">
        <label class="label">宛先プレビュー</label>
        <div id="previewBox" class="preview-box">まだ取得していません。</div>
      </div>

      <div class="field">
        <label class="label">最近の送信ログ</label>
        <div id="logBox" class="log-box">まだ読み込んでいません。</div>
      </div>
    </section>
  </div>

  <script>
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyg0g1BMLA8HIVB13iyN4IbEcG7rOKG8m5NzUNl7a9U_ovSGno5c7pd1Vd7Woqo8brf/exec';

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function setStatus(message, type) {
      const el = document.getElementById('statusBox');
      el.className = 'status-box';
      if (type === 'ok') el.classList.add('ok');
      if (type === 'error') el.classList.add('error');
      if (type === 'warn') el.classList.add('warn');
      el.textContent = String(message || '');
    }

    function setMessageMode(mode) {
      document.getElementById('messageMode').value = mode;

      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });

      document.getElementById('directFields').classList.toggle('hidden', mode !== 'direct');
      document.getElementById('practiceFields').classList.toggle('hidden', mode !== 'practice');
      document.getElementById('eventFields').classList.toggle('hidden', mode !== 'event');

      setStatus('送信モードを切り替えました。', 'ok');
    }

    async function fetchJson(url, options) {
      const res = await fetch(url, options);
      const text = await res.text();

      try {
        return JSON.parse(text);
      } catch (e) {
        throw new Error('JSON解析に失敗しました: ' + text.slice(0, 300));
      }
    }

    function renderMemberApplications(items) {
      const el = document.getElementById('memberApplications');
      document.getElementById('summaryMemberCount').textContent = Array.isArray(items) ? items.length : 0;

      if (!items || !items.length) {
        el.innerHTML = '<div class="item"><div class="item-sub">表示対象はありません。</div></div>';
        return;
      }

      el.innerHTML = items.map(item => `
        <div class="item">
          <div class="item-title">${escapeHtml(item.childName || '氏名未設定')}</div>
          <div class="item-sub">
学年：${escapeHtml(item.grade || '')}
保護者：${escapeHtml(item.parentName || '')}
希望区分：${escapeHtml(item.desiredCategory || '')}
承認区分：${escapeHtml(item.approvedCategory || '')}
申込ステータス：${escapeHtml(item.applicationStatus || '')}
体験利用状況：${escapeHtml(item.trialStatus || '')}
所属：${escapeHtml(item.affiliation || '')}
備考：${escapeHtml(item.note || '')}
          </div>
        </div>
      `).join('');
    }

    function renderTrialApplications(items) {
      const el = document.getElementById('trialApplications');

      const filtered = (items || []).filter(item => item.applicationStatus !== '体験完了');
      document.getElementById('summaryTrialCount').textContent = filtered.length;

      if (!filtered.length) {
        el.innerHTML = '<div class="item"><div class="item-sub">表示対象はありません。</div></div>';
        return;
      }

      el.innerHTML = filtered.map(item => `
        <div class="item">
          <div class="item-title">${escapeHtml(item.childName || '氏名未設定')}</div>
          <div class="item-sub">
学年：${escapeHtml(item.grade || '')}
保護者：${escapeHtml(item.parentName || '')}
所属チーム：${escapeHtml(item.teamName || '')}
希望練習日：${escapeHtml(item.requestedPracticeDate || '')}
希望練習ラベル：${escapeHtml(item.requestedPracticeLabel || '')}
申請ステータス：${escapeHtml(item.applicationStatus || '')}
管理者メモ：${escapeHtml(item.adminMemo || '')}
          </div>
        </div>
      `).join('');
    }

    function renderPractices(items) {
      const el = document.getElementById('adminPractices');
      document.getElementById('summaryPracticeCount').textContent = Array.isArray(items) ? items.length : 0;

      if (!items || !items.length) {
        el.innerHTML = '<div class="item"><div class="item-sub">表示対象はありません。</div></div>';
        return;
      }

      el.innerHTML = items.map(item => {
        const club = Array.isArray(item.participants?.['クラブ']) ? item.participants['クラブ'] : [];
        const school = Array.isArray(item.participants?.['スクール']) ? item.participants['スクール'] : [];
        const general = Array.isArray(item.participants?.['一般']) ? item.participants['一般'] : [];

        return `
          <div class="item">
            <div class="item-title">${escapeHtml(item.date || '')}｜${escapeHtml(item.title || '')}</div>
            <div class="item-sub">${escapeHtml(item.startTime || '')}${item.startTime && item.endTime ? '〜' : ''}${escapeHtml(item.endTime || '')}｜${escapeHtml(item.place || '')}</div>
            <div class="badge-row">
              <span class="badge blue">参加予定人数 ${Number(item.participantCount || 0)}名</span>
            </div>

            <div class="participant-group">
              <div class="participant-title">クラブ</div>
              <div class="small">${club.length ? escapeHtml(club.join('、')) : 'なし'}</div>
            </div>

            <div class="participant-group">
              <div class="participant-title">スクール</div>
              <div class="small">${school.length ? escapeHtml(school.join('、')) : 'なし'}</div>
            </div>

            <div class="participant-group">
              <div class="participant-title">一般</div>
              <div class="small">${general.length ? escapeHtml(general.join('、')) : 'なし'}</div>
            </div>

            <div class="participant-group">
              <div class="participant-title">備考</div>
              <div class="small">${escapeHtml(item.note || '') || 'なし'}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderEvents(items) {
      const el = document.getElementById('adminEvents');
      document.getElementById('summaryEventCount').textContent = Array.isArray(items) ? items.length : 0;

      if (!items || !items.length) {
        el.innerHTML = '<div class="item"><div class="item-sub">表示対象はありません。</div></div>';
        return;
      }

      el.innerHTML = items.map(item => {
        const club = Array.isArray(item.participants?.['クラブ']) ? item.participants['クラブ'] : [];
        const school = Array.isArray(item.participants?.['スクール']) ? item.participants['スクール'] : [];
        const general = Array.isArray(item.participants?.['一般']) ? item.participants['一般'] : [];

        return `
          <div class="item">
            <div class="item-title">${escapeHtml(item.eventName || 'イベント')}</div>
            <div class="item-sub">
開催日：${escapeHtml(item.eventDate || '')}
時間：${escapeHtml(item.startTime || '')}${item.startTime && item.endTime ? '〜' : ''}${escapeHtml(item.endTime || '')}
場所：${escapeHtml(item.place || '')}
対象：${escapeHtml(item.targetLabel || '')}
募集状況：${escapeHtml(item.statusLabel || '')}
            </div>

            <div class="badge-row">
              <span class="badge blue">定員 ${Number(item.capacity || 0)}名</span>
              <span class="badge green">申込 ${Number(item.currentCount || 0)}名</span>
              <span class="badge orange">残数 ${Number(item.remainingCount || 0)}名</span>
            </div>

            <div class="participant-group">
              <div class="participant-title">クラブ</div>
              <div class="small">${club.length ? escapeHtml(club.join('、')) : 'なし'}</div>
            </div>

            <div class="participant-group">
              <div class="participant-title">スクール</div>
              <div class="small">${school.length ? escapeHtml(school.join('、')) : 'なし'}</div>
            </div>

            <div class="participant-group">
              <div class="participant-title">一般</div>
              <div class="small">${general.length ? escapeHtml(general.join('、')) : 'なし'}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function loadDashboard() {
      try {
        setStatus('管理ハブを読み込み中です…', 'warn');

        const [
          memberRes,
          trialRes,
          practiceRes,
          eventRes
        ] = await Promise.all([
          fetchJson(`${GAS_WEB_APP_URL}?mode=pendingMemberApplications`),
          fetchJson(`${GAS_WEB_APP_URL}?mode=pendingTrialApplications`),
          fetchJson(`${GAS_WEB_APP_URL}?mode=adminPractices4weeks`),
          fetchJson(`${GAS_WEB_APP_URL}?mode=adminEventsWithParticipants`)
        ]);

        if (!memberRes.ok) throw new Error(memberRes.message || '会員申請の取得に失敗しました');
        if (!trialRes.ok) throw new Error(trialRes.message || '無料体験申請の取得に失敗しました');
        if (!practiceRes.ok) throw new Error(practiceRes.message || '練習一覧の取得に失敗しました');
        if (!eventRes.ok) throw new Error(eventRes.message || 'イベント一覧の取得に失敗しました');

        renderMemberApplications(memberRes.items || []);
        renderTrialApplications(trialRes.items || []);
        renderPractices(practiceRes.items || []);
        renderEvents(eventRes.items || []);

        await loadDirectLogs();

        setStatus('管理ハブの読み込みが完了しました。', 'ok');
      } catch (error) {
        setStatus('読み込みに失敗しました: ' + error.message, 'error');
        console.error('[loadDashboard]', error);
      }
    }

    function buildPreviewQuery() {
      const mode = document.getElementById('messageMode').value;

      return new URLSearchParams({
        mode: 'directMessagePreview',
        messageMode: mode,
        lineUserId: document.getElementById('lineUserId').value.trim(),
        childName: document.getElementById('childName').value.trim(),
        category: document.getElementById('category').value.trim(),
        practiceId: document.getElementById('practiceId').value.trim(),
        eventPageId: document.getElementById('eventPageId').value.trim()
      });
    }

    function buildSendBody(dryRun) {
      const mode = document.getElementById('messageMode').value;

      return new URLSearchParams({
        action: 'executeDirectMessageSend',
        sendMode: mode,
        lineUserId: document.getElementById('lineUserId').value.trim(),
        childName: document.getElementById('childName').value.trim(),
        category: document.getElementById('category').value.trim(),
        practiceId: document.getElementById('practiceId').value.trim(),
        eventPageId: document.getElementById('eventPageId').value.trim(),
        message: document.getElementById('messageText').value,
        dryRun: String(!!dryRun)
      });
    }

    async function previewRecipients() {
      try {
        setStatus('宛先プレビューを取得中です…', 'warn');

        const query = buildPreviewQuery();
        const json = await fetchJson(`${GAS_WEB_APP_URL}?${query.toString()}`);

        if (!json.ok) {
          throw new Error(json.message || '宛先プレビュー取得に失敗しました');
        }

        const recipients = Array.isArray(json.recipients) ? json.recipients : [];
        const box = document.getElementById('previewBox');

        if (!recipients.length) {
          box.innerHTML = '対象が0件です。';
          setStatus('宛先プレビュー取得成功。対象0件です。', 'warn');
          return;
        }

        box.innerHTML = recipients.map(rec => `
          <div class="item">
            <div class="item-title">${escapeHtml(rec.childName || '氏名未設定')} / ${escapeHtml(rec.category || '区分未設定')}</div>
            <div class="item-sub">
LINE userID：${escapeHtml(rec.lineUserId || '')}
sourceType：${escapeHtml(rec.sourceType || '')}
sourceName：${escapeHtml(rec.sourceName || '')}
            </div>
          </div>
        `).join('');

        setStatus(`宛先プレビュー取得成功。${recipients.length}件です。`, 'ok');
      } catch (error) {
        document.getElementById('previewBox').innerHTML = '宛先プレビュー取得に失敗しました';
        setStatus('宛先プレビュー取得に失敗しました: ' + error.message, 'error');
        console.error('[previewRecipients]', error);
      }
    }

    async function sendDirectMessage(dryRun) {
      try {
        if (!dryRun) {
          const c1 = document.getElementById('check1').checked;
          const c2 = document.getElementById('check2').checked;
          const c3 = document.getElementById('check3').checked;

          if (!c1 || !c2 || !c3) {
            throw new Error('本番送信前の3チェックをすべてONにしてください');
          }
        }

        setStatus(dryRun ? 'dryRun送信中です…' : '本番送信中です…', 'warn');

        const body = buildSendBody(dryRun);
        const json = await fetchJson(GAS_WEB_APP_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
          },
          body: body.toString()
        });

        if (!json.ok) {
          throw new Error(json.message || '送信に失敗しました');
        }

        setStatus(
          `${dryRun ? 'dryRun' : '本番'}送信完了。成功 ${Number(json.successCount || 0)} 件 / エラー ${Number(json.errorCount || 0)} 件`,
          json.errorCount > 0 ? 'warn' : 'ok'
        );

        await loadDirectLogs();
      } catch (error) {
        setStatus('送信に失敗しました: ' + error.message, 'error');
        console.error('[sendDirectMessage]', error);
      }
    }

    async function loadDirectLogs() {
      try {
        const json = await fetchJson(`${GAS_WEB_APP_URL}?mode=directMessageLogs&limit=20`);

        if (!json.ok) {
          throw new Error(json.message || '送信ログ取得に失敗しました');
        }

        const items = Array.isArray(json.items) ? json.items : [];
        const box = document.getElementById('logBox');

        if (!items.length) {
          box.innerHTML = 'ログはありません。';
          return;
        }

        box.innerHTML = items.map(item => `
          <div class="item">
            <div class="item-title">${escapeHtml(item.sentAt || '')} / ${escapeHtml(item.mode || '')} / ${item.dryRun ? 'dryRun' : '本番'}</div>
            <div class="item-sub">
対象：${escapeHtml(item.childName || '')} / ${escapeHtml(item.category || '')}
LINE userID：${escapeHtml(item.lineUserId || '')}
結果：${escapeHtml(item.resultText || '')}
本文：
${escapeHtml(item.message || '')}
            </div>
          </div>
        `).join('');
      } catch (error) {
        document.getElementById('logBox').innerHTML = '送信ログ取得に失敗しました';
        console.error('[loadDirectLogs]', error);
      }
    }

    loadDashboard();
  </script>
</body>
</html>
