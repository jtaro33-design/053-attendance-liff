<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>053 管理ハブ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a; color: #e2e8f0; min-height: 100vh; line-height: 1.6;
    }
    .header {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border-bottom: 2px solid #334155; padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-size: 20px; font-weight: 800; color: #f8fafc; letter-spacing: 1px; }
    .header-sub { font-size: 12px; color: #64748b; margin-top: 2px; }
    .header-badge {
      font-size: 11px; color: #94a3b8; background: #1e293b;
      border: 1px solid #334155; padding: 4px 10px; border-radius: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 16px; }

    .summary-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px; }
    .summary-card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 14px; padding: 16px; text-align: center;
    }
    .summary-num { font-size: 36px; font-weight: 800; color: #f8fafc; line-height: 1; }
    .summary-num.warn { color: #fbbf24; }
    .summary-num.ok { color: #34d399; }
    .summary-label { font-size: 12px; color: #94a3b8; margin-top: 6px; font-weight: 600; }

    .tab-nav {
      display: flex; gap: 4px; margin-bottom: 16px; background: #1e293b;
      border-radius: 12px; padding: 4px; border: 1px solid #334155;
    }
    .tab-btn {
      flex: 1; padding: 10px 8px; font-size: 13px; font-weight: 700;
      color: #64748b; background: transparent; border: none;
      border-radius: 10px; cursor: pointer; text-align: center;
    }
    .tab-btn.active { background: #334155; color: #f8fafc; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .section-title { font-size: 16px; font-weight: 800; color: #f8fafc; }
    .section-sub {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }
    .section-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 14px; margin-bottom: 12px; overflow: hidden;
    }
    .card-header {
      padding: 16px; cursor: pointer; display: flex;
      justify-content: space-between; align-items: flex-start;
    }
    .card-header:active { background: rgba(255,255,255,0.03); }
    .card-main { font-size: 16px; font-weight: 700; color: #f1f5f9; }
    .card-sub { font-size: 13px; color: #94a3b8; margin-top: 2px; }
    .card-detail { font-size: 13px; color: #cbd5e1; margin-top: 4px; line-height: 1.7; }
    .card-detail-muted { font-size: 12px; color: #94a3b8; margin-top: 6px; line-height: 1.7; }
    .card-badge {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .badge-pending { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .badge-review { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid rgba(96,165,250,0.3); }
    .badge-approved { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
    .badge-event { background: rgba(168,85,247,0.15); color: #a78bfa; border: 1px solid rgba(168,85,247,0.3); }
    .badge-count {
      font-size: 12px; font-weight: 700; color: #34d399;
      background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.2);
      padding: 2px 10px; border-radius: 20px;
    }
    .expand-icon { color: #64748b; font-size: 14px; margin-left: 8px; margin-top: 2px; transition: transform 0.2s; }
    .card.open .expand-icon { transform: rotate(180deg); }

    .card-body { display: none; padding: 0 16px 16px; border-top: 1px solid #334155; }
    .card.open .card-body { display: block; }

    .practice-date { font-size: 15px; font-weight: 800; color: #60a5fa; }
    .practice-time { font-size: 13px; color: #94a3b8; }
    .practice-place { font-size: 13px; color: #cbd5e1; margin-top: 2px; }

    .participant-group { margin-top: 10px; }
    .participant-group-title {
      font-size: 12px; font-weight: 700; color: #94a3b8;
      margin-bottom: 4px; padding-bottom: 3px; border-bottom: 1px solid #334155;
    }
    .participant-group-title.club { color: #60a5fa; border-color: rgba(96,165,250,0.3); }
    .participant-group-title.school { color: #34d399; border-color: rgba(52,211,153,0.3); }
    .participant-group-title.general { color: #fbbf24; border-color: rgba(251,191,36,0.3); }
    .participant-names {
      font-size: 13px; color: #cbd5e1; line-height: 1.8; padding: 4px 0;
    }
    .participant-empty { font-size: 12px; color: #475569; padding: 8px 0; }

    .category-summary {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
      margin-bottom: 8px;
    }
    .category-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid transparent;
      min-height: 28px;
    }
    .category-chip.club {
      color: #60a5fa;
      background: rgba(96,165,250,0.12);
      border-color: rgba(96,165,250,0.28);
    }
    .category-chip.school {
      color: #34d399;
      background: rgba(52,211,153,0.12);
      border-color: rgba(52,211,153,0.28);
    }
    .category-chip.general {
      color: #fbbf24;
      background: rgba(251,191,36,0.12);
      border-color: rgba(251,191,36,0.28);
    }

    .memo-section { margin-top: 14px; padding-top: 12px; border-top: 1px solid #334155; }
    .memo-label { font-size: 12px; font-weight: 700; color: #94a3b8; margin-bottom: 6px; }
    .memo-input {
      width: 100%; min-height: 60px; padding: 10px; border-radius: 8px;
      border: 1px solid #475569; background: #0f172a; color: #e2e8f0;
      font-size: 14px; font-family: inherit; resize: vertical;
    }
    .memo-input:focus { outline: none; border-color: #60a5fa; }
    .memo-save-row { display: flex; justify-content: flex-end; margin-top: 8px; gap: 8px; align-items: center; }
    .memo-save-btn {
      padding: 6px 18px; font-size: 12px; font-weight: 700;
      border: none; border-radius: 8px; background: #2563eb; color: #fff; cursor: pointer;
    }
    .memo-save-btn:disabled { background: #475569; cursor: not-allowed; }
    .memo-status { font-size: 11px; color: #64748b; }

    .event-counts { display: flex; gap: 12px; margin-top: 6px; flex-wrap: wrap; }
    .event-count-item { font-size: 13px; color: #cbd5e1; }
    .event-count-item strong { color: #f8fafc; }

    .refresh-btn {
      padding: 6px 16px; font-size: 12px; font-weight: 700;
      border: 1px solid #475569; border-radius: 8px;
      background: transparent; color: #94a3b8; cursor: pointer;
    }
    .refresh-btn:hover { background: #334155; color: #e2e8f0; }

    .primary-link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 8px;
      text-decoration: none;
      background: #2563eb;
      color: #ffffff;
      border: 1px solid #2563eb;
      white-space: nowrap;
    }
    .primary-link-btn:hover {
      background: #1d4ed8;
      border-color: #1d4ed8;
    }

    .app-top-line {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 8px;
      margin-bottom: 6px;
    }
    .info-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: rgba(148,163,184,0.14);
      color: #cbd5e1;
      border: 1px solid rgba(148,163,184,0.2);
    }

    .loading-text { text-align: center; padding: 40px 0; color: #64748b; font-size: 14px; }
    .empty-text { text-align: center; padding: 30px 0; color: #475569; font-size: 14px; }
    .back-link {
      display: block; text-align: center; text-decoration: none;
      font-size: 14px; font-weight: 600; color: #64748b; padding: 12px; margin-top: 20px;
    }

    @media (max-width: 640px) {
      .summary-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="header-title">053 管理ハブ</div>
      <div class="header-sub">Management Dashboard</div>
    </div>
    <div class="header-badge" id="lastUpdated">読み込み中...</div>
  </div>

  <div class="container">
    <div class="summary-row">
      <div class="summary-card">
        <div class="summary-num warn" id="sumApplications">-</div>
        <div class="summary-label">承認待ち</div>
      </div>
      <div class="summary-card">
        <div class="summary-num" id="sumPractices">-</div>
        <div class="summary-label">今後4週の練習</div>
      </div>
      <div class="summary-card">
        <div class="summary-num" id="sumEvents">-</div>
        <div class="summary-label">公開中イベント</div>
      </div>
    </div>

    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('applications')">入会申請</button>
      <button class="tab-btn" onclick="switchTab('practices')">通常練習</button>
      <button class="tab-btn" onclick="switchTab('events')">イベント</button>
    </div>

    <div class="tab-panel active" id="panel-applications">
      <div class="section-header">
        <div>
          <div class="section-title">入会申請一覧</div>
          <div class="section-sub">承認・差戻し・区分確定は専用ページで行います</div>
        </div>
        <div class="section-actions">
          <a href="./admin_member_approval.html" class="primary-link-btn" id="approvalPageLink">承認ページへ</a>
          <button class="refresh-btn" onclick="loadApplications()">更新</button>
        </div>
      </div>
      <div id="applicationList"><div class="loading-text">読み込み中...</div></div>
    </div>

    <div class="tab-panel" id="panel-practices">
      <div class="section-header">
        <div class="section-title">通常練習（今後4週間）</div>
        <button class="refresh-btn" onclick="loadPractices()">更新</button>
      </div>
      <div id="practiceList"><div class="loading-text">読み込み中...</div></div>
    </div>

    <div class="tab-panel" id="panel-events">
      <div class="section-header">
        <div class="section-title">イベント / クリニック</div>
        <button class="refresh-btn" onclick="loadEvents()">更新</button>
      </div>
      <div id="eventList"><div class="loading-text">読み込み中...</div></div>
    </div>

    <a href="./entry_select.html" class="back-link">← 申込メニューへ戻る</a>
  </div>

  <script>
    var WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyg0g1BMLA8HIVB13iyN4IbEcG7rOKG8m5NzUNl7a9U_ovSGno5c7pd1Vd7Woqo8brf/exec';
    var appData = { applications: [], practices: [], events: [] };

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
      var idx = { applications: 0, practices: 1, events: 2 };
      document.querySelectorAll('.tab-btn')[idx[tabId]].classList.add('active');
      document.getElementById('panel-' + tabId).classList.add('active');
    }

    function toggleCard(el) {
      el.closest('.card').classList.toggle('open');
    }

    function formatDateJa(dateStr) {
      if (!dateStr) return '';
      var d = new Date(dateStr + 'T00:00:00');
      if (isNaN(d.getTime())) return dateStr;
      var w = ['日','月','火','水','木','金','土'];
      return (d.getMonth()+1) + '/' + d.getDate() + '（' + w[d.getDay()] + '）';
    }

    function formatDateTimeShort(isoStr) {
      if (!isoStr) return '';
      var d = new Date(isoStr);
      if (isNaN(d.getTime())) return isoStr;
      return (d.getMonth()+1) + '/' + d.getDate();
    }

    function isToday(dateStr) {
      if (!dateStr) return false;
      var now = new Date();
      var today = now.getFullYear() + '-' +
        ('0'+(now.getMonth()+1)).slice(-2) + '-' +
        ('0'+now.getDate()).slice(-2);
      return dateStr === today;
    }

    function statusBadgeHtml(status) {
      if (status === '受付') return '<span class="card-badge badge-pending">受付</span>';
      if (status === '確認中') return '<span class="card-badge badge-review">確認中</span>';
      if (status === '承認') return '<span class="card-badge badge-approved">承認（未反映）</span>';
      if (status === '差戻し') return '<span class="card-badge badge-review">差戻し</span>';
      if (status === '見送り') return '<span class="card-badge">見送り</span>';
      return '<span class="card-badge">' + (status || '不明') + '</span>';
    }

    function updateApprovalLink() {
      var link = document.getElementById('approvalPageLink');
      var count = appData.applications.length;
      if (!link) return;
      link.textContent = count > 0 ? '承認ページへ（' + count + '件）' : '承認ページへ';
    }

    function getCategoryCounts(participants) {
      var club = (participants && participants['クラブ']) ? participants['クラブ'].length : 0;
      var school = (participants && participants['スクール']) ? participants['スクール'].length : 0;
      var general = (participants && participants['一般']) ? participants['一般'].length : 0;
      return {
        club: club,
        school: school,
        general: general
      };
    }

    function renderCategorySummary(participants) {
      var counts = getCategoryCounts(participants);
      return '' +
        '<div class="category-summary">' +
          '<span class="category-chip club">クラブ ' + counts.club + '名</span>' +
          '<span class="category-chip school">スクール ' + counts.school + '名</span>' +
          '<span class="category-chip general">一般 ' + counts.general + '名</span>' +
        '</div>';
    }

    function renderParticipantGroups(participants) {
      if (!participants) return '<div class="participant-empty">参加者情報なし</div>';

      var clubList = participants['クラブ'] || [];
      var schoolList = participants['スクール'] || [];
      var generalList = participants['一般'] || [];
      var total = clubList.length + schoolList.length + generalList.length;

      if (total === 0) return '<div class="participant-empty">申込者はまだいません</div>';

      var html = '';

      if (clubList.length > 0) {
        html += '<div class="participant-group">';
        html += '<div class="participant-group-title club">クラブ（' + clubList.length + '名）</div>';
        html += '<div class="participant-names">' + clubList.join('、') + '</div>';
        html += '</div>';
      }

      if (schoolList.length > 0) {
        html += '<div class="participant-group">';
        html += '<div class="participant-group-title school">スクール（' + schoolList.length + '名）</div>';
        html += '<div class="participant-names">' + schoolList.join('、') + '</div>';
        html += '</div>';
      }

      if (generalList.length > 0) {
        html += '<div class="participant-group">';
        html += '<div class="participant-group-title general">一般（' + generalList.length + '名）</div>';
        html += '<div class="participant-names">' + generalList.join('、') + '</div>';
        html += '</div>';
      }

      return html;
    }

    function updateSummary() {
      var ac = appData.applications.length;
      var el = document.getElementById('sumApplications');
      el.textContent = ac;
      el.className = ac > 0 ? 'summary-num warn' : 'summary-num ok';

      document.getElementById('sumPractices').textContent = appData.practices.length;
      document.getElementById('sumEvents').textContent = appData.events.length;

      var now = new Date();
      document.getElementById('lastUpdated').textContent =
        '最終更新 ' + now.getHours() + ':' + ('0' + now.getMinutes()).slice(-2);
    }

    async function loadApplications() {
      var c = document.getElementById('applicationList');
      c.innerHTML = '<div class="loading-text">読み込み中...</div>';

      try {
        var res = await fetch(WEB_APP_URL + '?mode=pendingMemberApplications');
        var json = await res.json();
        appData.applications = (json.ok && Array.isArray(json.items)) ? json.items : [];
      } catch (e) {
        appData.applications = [];
      }

      renderApplications();
      updateApprovalLink();
      updateSummary();
    }

    function renderApplications() {
      var c = document.getElementById('applicationList');
      var items = appData.applications;

      if (items.length === 0) {
        c.innerHTML = '<div class="empty-text">対応が必要な入会申請はありません</div>';
        return;
      }

      var html = '';

      items.forEach(function(item) {
        html += '<div class="card"><div style="padding:16px;">';

        html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:6px;">';
        html += '<div>';
        html += '<div class="card-main">' + (item.childName || '氏名なし') + '</div>';
        html += '<div class="card-sub">' + (item.grade || '学年未設定') + '　保護者: ' + (item.parentName || '未入力') + '</div>';
        html += '</div>';
        html += statusBadgeHtml(item.applicationStatus);
        html += '</div>';

        html += '<div class="app-top-line">';
        html += '<span class="info-chip">希望区分: ' + (item.desiredCategory || '未選択') + '</span>';
        if (item.trialStatus) {
          html += '<span class="info-chip">体験: ' + item.trialStatus + '</span>';
        }
        if (item.approvedCategory) {
          html += '<span class="info-chip">承認区分: ' + item.approvedCategory + '</span>';
        }
        html += '</div>';

        html += '<div class="card-detail">';
        if (item.affiliation) html += '所属: ' + item.affiliation + '<br>';
        if (item.phone) html += '電話番号: ' + item.phone + '<br>';
        if (item.email) html += 'メール: ' + item.email + '<br>';
        if (item.appliedAt) html += '申込日: ' + formatDateTimeShort(item.appliedAt);
        html += '</div>';

        if (item.note) {
          html += '<div class="card-detail-muted">備考: ' + item.note + '</div>';
        }

        html += '</div></div>';
      });

      c.innerHTML = html;
    }

    async function loadPractices() {
      var c = document.getElementById('practiceList');
      c.innerHTML = '<div class="loading-text">読み込み中...</div>';

      try {
        var res = await fetch(WEB_APP_URL + '?mode=adminPractices4weeks');
        var json = await res.json();

        if (json.ok && Array.isArray(json.items)) {
          appData.practices = json.items;
        } else {
          appData.practices = [];
        }
      } catch (e) {
        appData.practices = [];
      }

      if (appData.practices.length === 0) {
        try {
          var fb = await fetch(WEB_APP_URL + '?mode=publicPractices');
          var fbJson = await fb.json();

          if (fbJson.ok && Array.isArray(fbJson.items)) {
            var now = new Date();
            now.setHours(0, 0, 0, 0);

            var limit = new Date(now);
            limit.setDate(now.getDate() + 28);

            appData.practices = fbJson.items.filter(function(i) {
              if (!i.date) return false;
              var d = new Date(i.date + 'T00:00:00');
              return d >= now && d <= limit;
            }).map(function(i) {
              return {
                id: i.id,
                date: i.date,
                title: i.title || '',
                startTime: i.startTime || '',
                endTime: i.endTime || '',
                place: i.place || '',
                note: i.note || '',
                participantCount: 0,
                participants: null
              };
            });
          }
        } catch (e2) {
          appData.practices = [];
        }
      }

      renderPractices();
      updateSummary();
    }

    function renderPractices() {
      var c = document.getElementById('practiceList');
      var items = appData.practices;

      if (items.length === 0) {
        c.innerHTML = '<div class="empty-text">今後4週間に公開中の通常練習はありません</div>';
        return;
      }

      var html = '';

      items.forEach(function(item, idx) {
        var todayTag = isToday(item.date)
          ? ' <span style="color:#fbbf24;font-size:12px;font-weight:700;">TODAY</span>'
          : '';

        var count = item.participantCount || 0;

        html += '<div class="card" id="pcard-' + idx + '">';

        html += '<div class="card-header" onclick="toggleCard(this)">';
        html += '<div style="flex:1;">';
        html += '<div class="practice-date">' + formatDateJa(item.date) + todayTag + '</div>';
        html += '<div class="practice-time">';
        if (item.startTime || item.endTime) {
          html += (item.startTime || '') + (item.startTime && item.endTime ? '〜' : '') + (item.endTime || '');
        }
        html += '</div>';
        if (item.place) html += '<div class="practice-place">' + item.place + '</div>';
        html += '</div>';

        html += '<div style="display:flex;align-items:center;gap:6px;">';
        html += '<span class="badge-count">' + count + '名</span>';
        html += '<span class="expand-icon">▼</span>';
        html += '</div>';
        html += '</div>';

        html += '<div class="card-body">';
        html += renderCategorySummary(item.participants);
        html += renderParticipantGroups(item.participants);

        html += '<div class="memo-section">';
        html += '<div class="memo-label">練習メモ（備考）</div>';
        html += '<textarea class="memo-input" id="pmemo-' + idx + '" placeholder="練習テーマ、連絡事項など">' + (item.note || '') + '</textarea>';
        html += '<div class="memo-save-row">';
        html += '<span class="memo-status" id="pmemo-status-' + idx + '"></span>';
        html += '<button class="memo-save-btn" onclick="savePracticeMemo(\'' + item.id + '\',' + idx + ')">保存</button>';
        html += '</div>';
        html += '</div>';

        html += '</div>';
        html += '</div>';
      });

      c.innerHTML = html;
    }

    async function savePracticeMemo(practiceId, idx) {
      var textarea = document.getElementById('pmemo-' + idx);
      var statusEl = document.getElementById('pmemo-status-' + idx);
      var btn = textarea.parentElement.querySelector('.memo-save-btn');
      var memo = textarea.value;

      btn.disabled = true;
      statusEl.textContent = '保存中...';

      try {
        var url = WEB_APP_URL + '?mode=updatePracticeMemo'
          + '&practiceId=' + encodeURIComponent(practiceId)
          + '&memo=' + encodeURIComponent(memo);

        var res = await fetch(url);
        var json = await res.json();

        if (json.ok) {
          statusEl.textContent = '保存しました';
          statusEl.style.color = '#34d399';
        } else {
          statusEl.textContent = 'エラー: ' + (json.message || '');
          statusEl.style.color = '#f87171';
        }
      } catch (e) {
        statusEl.textContent = '通信エラー';
        statusEl.style.color = '#f87171';
      }

      btn.disabled = false;
      setTimeout(function() {
        statusEl.textContent = '';
        statusEl.style.color = '';
      }, 3000);
    }

    async function loadEvents() {
      var c = document.getElementById('eventList');
      c.innerHTML = '<div class="loading-text">読み込み中...</div>';

      try {
        var res = await fetch(WEB_APP_URL + '?mode=adminEventsWithParticipants');
        var json = await res.json();

        if (json.ok && Array.isArray(json.items)) {
          appData.events = json.items;
        } else {
          appData.events = [];
        }
      } catch (e) {
        appData.events = [];
      }

      if (appData.events.length === 0) {
        try {
          var fb = await fetch(WEB_APP_URL + '?mode=publicEvents');
          var fbJson = await fb.json();

          if (fbJson.ok && Array.isArray(fbJson.items)) {
            appData.events = fbJson.items.map(function(i) {
              i.participants = null;
              return i;
            });
          }
        } catch (e2) {
          appData.events = [];
        }
      }

      renderEvents();
      updateSummary();
    }

    function renderEvents() {
      var c = document.getElementById('eventList');
      var items = appData.events;

      if (items.length === 0) {
        c.innerHTML = '<div class="empty-text">公開中のイベント/クリニックはありません</div>';
        return;
      }

      var html = '';

      items.forEach(function(item, idx) {
        var todayTag = isToday(item.eventDate)
          ? ' <span style="color:#fbbf24;font-size:12px;font-weight:700;">TODAY</span>'
          : '';

        html += '<div class="card" id="ecard-' + idx + '">';

        html += '<div class="card-header" onclick="toggleCard(this)">';
        html += '<div style="flex:1;">';
        html += '<div class="card-main">' + (item.eventName || 'イベント名なし') + todayTag + '</div>';
        html += '<div class="card-sub">' + formatDateJa(item.eventDate);
        if (item.startTime || item.endTime) {
          html += '　' + (item.startTime || '') + (item.startTime && item.endTime ? '〜' : '') + (item.endTime || '');
        }
        html += '</div>';
        html += '</div>';

        html += '<div style="display:flex;align-items:center;gap:6px;">';
        html += '<span class="card-badge badge-event">' + (item.statusLabel || '募集中') + '</span>';
        html += '<span class="expand-icon">▼</span>';
        html += '</div>';
        html += '</div>';

        html += '<div class="card-body">';

        if (item.place) html += '<div class="card-detail">' + item.place + '</div>';

        html += '<div class="event-counts">';
        html += '<div class="event-count-item">申込: <strong>' + (item.currentCount || 0) + '</strong>名</div>';
        html += '<div class="event-count-item">定員: <strong>' + (item.capacity || '-') + '</strong>名</div>';
        html += '<div class="event-count-item">残: <strong>' + (item.remainingCount || 0) + '</strong>名</div>';
        html += '</div>';

        html += renderCategorySummary(item.participants);

        html += '<div class="card-detail" style="margin-top:8px;">';
        html += '料金: クラブ ' + (item.clubPrice || 0) + '円 / スクール ' + (item.schoolPrice || 0) + '円 / 一般 ' + (item.generalPrice || 0) + '円';
        html += '</div>';

        if (item.targetLabel) html += '<div class="card-detail">対象: ' + item.targetLabel + '</div>';

        html += '<div style="margin-top:12px;">';
        html += renderParticipantGroups(item.participants);
        html += '</div>';

        if (item.note) html += '<div class="card-detail" style="margin-top:8px;">備考: ' + item.note + '</div>';

        html += '</div>';
        html += '</div>';
      });

      c.innerHTML = html;
    }

    window.addEventListener('load', async function() {
      await Promise.all([ loadApplications(), loadPractices(), loadEvents() ]);
    });
  </script>
</body>
</html>
