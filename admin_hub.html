<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理ハブ</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
      line-height: 1.6;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: 0.01em;
    }

    .sub {
      margin-top: 6px;
      font-size: 13px;
      color: #475569;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn,
    button,
    a {
      font: inherit;
    }

    .btn,
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .secondary:hover {
      background: #cbd5e1;
    }

    .hub-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid transparent;
      transition: 0.2s ease;
    }

    .hub-link.member {
      background: #eff6ff;
      color: #1d4ed8;
      border-color: #bfdbfe;
    }

    .hub-link.member:hover {
      background: #dbeafe;
    }

    .hub-link.trial {
      background: #ecfeff;
      color: #0f766e;
      border-color: #a5f3fc;
    }

    .hub-link.trial:hover {
      background: #cffafe;
    }

    .status {
      margin-bottom: 18px;
      background: #ffffff;
      border: 1px solid #dbe3ee;
      border-left: 5px solid #2563eb;
      border-radius: 14px;
      padding: 13px 15px;
      font-size: 14px;
      font-weight: 600;
      color: #334155;
      white-space: pre-wrap;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 22px;
    }

    .summary-card {
      border-radius: 16px;
      padding: 16px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
    }

    .summary-card.member {
      background: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%);
    }

    .summary-card.trial {
      background: linear-gradient(180deg, #ecfeff 0%, #ffffff 100%);
    }

    .summary-card.practice {
      background: linear-gradient(180deg, #f0fdf4 0%, #ffffff 100%);
    }

    .summary-card.event {
      background: linear-gradient(180deg, #fff7ed 0%, #ffffff 100%);
    }

    .summary-label {
      font-size: 12px;
      font-weight: 800;
      color: #64748b;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }

    .summary-value {
      font-size: 32px;
      font-weight: 800;
      color: #0f172a;
      line-height: 1;
    }

    .summary-note {
      margin-top: 10px;
      font-size: 12px;
      color: #64748b;
      line-height: 1.5;
    }

    .section {
      margin-top: 24px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      color: #0f172a;
      margin: 0;
      letter-spacing: 0.01em;
    }

    .section-sub {
      font-size: 12px;
      color: #64748b;
      margin-top: 3px;
    }

    .section-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .panel {
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.05);
      border: 1px solid #e2e8f0;
      background: #ffffff;
    }

    .panel.member {
      background: #f8fbff;
    }

    .panel.trial {
      background: #f7feff;
    }

    .panel.practice {
      background: #fbfefb;
    }

    .panel.event {
      background: #fffdfa;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .card {
      border-radius: 14px;
      padding: 14px;
      border: 1px solid #e2e8f0;
      background: #ffffff;
    }

    .card.member {
      border-left: 5px solid #60a5fa;
    }

    .card.trial {
      border-left: 5px solid #22c55e;
    }

    .card.practice {
      border-left: 5px solid #16a34a;
    }

    .card.event {
      border-left: 5px solid #f59e0b;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 17px;
      font-weight: 800;
      color: #0f172a;
      line-height: 1.4;
    }

    .card-meta {
      margin-top: 4px;
      font-size: 13px;
      color: #64748b;
    }

    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill-default { background: #e2e8f0; color: #334155; }
    .pill-open { background: #dbeafe; color: #1d4ed8; }
    .pill-checking { background: #fef3c7; color: #b45309; }
    .pill-approved { background: #dcfce7; color: #15803d; }
    .pill-returned { background: #fee2e2; color: #b91c1c; }
    .pill-completed { background: #cffafe; color: #0f766e; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 14px;
    }

    .info-box {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 68px;
    }

    .label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      color: #64748b;
      margin-bottom: 5px;
      letter-spacing: 0.02em;
    }

    .value {
      font-size: 14px;
      font-weight: 600;
      color: #0f172a;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    .participants {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }

    .participant-row {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px 12px;
    }

    .participant-label {
      font-size: 12px;
      font-weight: 800;
      color: #64748b;
      margin-bottom: 4px;
    }

    .participant-value {
      font-size: 14px;
      font-weight: 600;
      color: #0f172a;
      word-break: break-word;
      line-height: 1.6;
    }

    .empty {
      text-align: center;
      background: #ffffff;
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      padding: 32px 16px;
      color: #64748b;
      font-size: 14px;
    }

    .two-col {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .accordion-card {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      background: #ffffff;
    }

    .accordion-summary {
      width: 100%;
      border: none;
      background: transparent;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      text-align: left;
    }

    .accordion-summary.practice {
      background: linear-gradient(180deg, #f0fdf4 0%, #ffffff 100%);
    }

    .accordion-summary.event {
      background: linear-gradient(180deg, #fff7ed 0%, #ffffff 100%);
    }

    .accordion-left {
      min-width: 0;
      flex: 1;
    }

    .accordion-title {
      font-size: 16px;
      font-weight: 800;
      color: #0f172a;
      line-height: 1.5;
    }

    .accordion-meta {
      margin-top: 4px;
      font-size: 13px;
      color: #64748b;
    }

    .accordion-arrow {
      flex-shrink: 0;
      font-size: 18px;
      font-weight: 800;
      color: #64748b;
      transition: transform 0.2s ease;
    }

    .accordion-card.open .accordion-arrow {
      transform: rotate(180deg);
    }

    .accordion-detail {
      display: none;
      padding: 0 14px 14px;
      background: #ffffff;
    }

    .accordion-card.open .accordion-detail {
      display: block;
    }

    @media (max-width: 960px) {
      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .two-col {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .summary-grid,
      .info-grid {
        grid-template-columns: 1fr;
      }

      .container {
        padding: 16px 12px 32px;
      }

      h1 {
        font-size: 24px;
      }

      .section-title {
        font-size: 18px;
      }

      .summary-value {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-head">
      <div>
        <h1>管理ハブ</h1>
        <div class="sub">申請・無料体験・練習・イベントの状況をまとめて確認します</div>
      </div>
      <div class="top-actions">
        <a href="./admin_member_approval.html" class="hub-link member">会員申請管理へ</a>
        <a href="./admin_trial_approval.html" class="hub-link trial">無料体験承認管理へ</a>
        <button class="secondary" onclick="loadHub()">一覧を更新</button>
      </div>
    </div>

    <div id="status" class="status">読み込み中です。</div>

    <div class="summary-grid">
      <div class="summary-card member">
        <div class="summary-label">会員申請</div>
        <div class="summary-value" id="memberCount">-</div>
        <div class="summary-note">受付 / 確認中 / 未反映承認</div>
      </div>
      <div class="summary-card trial">
        <div class="summary-label">無料体験申請</div>
        <div class="summary-value" id="trialCount">-</div>
        <div class="summary-note">現場対応が必要な申請のみ表示</div>
      </div>
      <div class="summary-card practice">
        <div class="summary-label">今後4週間の練習</div>
        <div class="summary-value" id="practiceCount">-</div>
        <div class="summary-note">参加者込みで確認</div>
      </div>
      <div class="summary-card.event">
        <div class="summary-label">公開中イベント</div>
        <div class="summary-value" id="eventCount">-</div>
        <div class="summary-note">参加者込みで確認</div>
      </div>
    </div>

    <div class="two-col">
      <div class="section">
        <div class="section-head">
          <div>
            <div class="section-title">会員申請</div>
            <div class="section-sub">直近の確認対象を表示</div>
          </div>
          <div class="section-actions">
            <a href="./admin_member_approval.html" class="hub-link member">詳細管理へ</a>
          </div>
        </div>
        <div class="panel member">
          <div id="memberList" class="list"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-head">
          <div>
            <div class="section-title">無料体験申請</div>
            <div class="section-sub">直近の無料体験申請を表示</div>
          </div>
          <div class="section-actions">
            <a href="./admin_trial_approval.html" class="hub-link trial">詳細管理へ</a>
          </div>
        </div>
        <div class="panel trial">
          <div id="trialList" class="list"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <div>
          <div class="section-title">今後4週間の通常練習</div>
          <div class="section-sub">最初は簡潔表示、クリックで詳細展開</div>
        </div>
      </div>
      <div class="panel practice">
        <div id="practiceList" class="list"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <div>
          <div class="section-title">公開中イベント / クリニック</div>
          <div class="section-sub">最初は簡潔表示、クリックで詳細展開</div>
        </div>
      </div>
      <div class="panel event">
        <div id="eventList" class="list"></div>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyg0g1BMLA8HIVB13iyN4IbEcG7rOKG8m5NzUNl7a9U_ovSGno5c7pd1Vd7Woqo8brf/exec';

    function setStatus(message) {
      document.getElementById('status').textContent = message;
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatDateOnly(value) {
      if (!value) return '';
      const d = new Date(value);
      if (isNaN(d.getTime())) return value;

      return new Intl.DateTimeFormat('ja-JP', {
        timeZone: 'Asia/Tokyo',
        month: 'numeric',
        day: 'numeric',
        weekday: 'short'
      }).format(d);
    }

    function formatDateTime(value) {
      if (!value) return '';
      const d = new Date(value);
      if (isNaN(d.getTime())) return value;

      return new Intl.DateTimeFormat('ja-JP', {
        timeZone: 'Asia/Tokyo',
        year: 'numeric',
        month: 'numeric',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit'
      }).format(d);
    }

    function getStatusPill(status) {
      if (status === '受付') return '<span class="pill pill-open">受付</span>';
      if (status === '確認中') return '<span class="pill pill-checking">確認中</span>';
      if (status === '承認') return '<span class="pill pill-approved">承認</span>';
      if (status === '差戻し') return '<span class="pill pill-returned">差戻し</span>';
      if (status === '体験完了') return '<span class="pill pill-completed">体験完了</span>';
      return '<span class="pill pill-default">' + escapeHtml(status || '未設定') + '</span>';
    }

    async function fetchJson(url) {
      const response = await fetch(url, { cache: 'no-store' });
      return await response.json();
    }

    function normalizeMemberItems(data) {
      if (Array.isArray(data)) return data;
      if (data && Array.isArray(data.items)) return data.items;
      return [];
    }

    function normalizeTrialItems(data) {
      if (data && Array.isArray(data.items)) return data.items;
      return [];
    }

    function normalizePracticeItems(data) {
      if (data && Array.isArray(data.items)) return data.items;
      return [];
    }

    function normalizeEventItems(data) {
      if (Array.isArray(data)) return data;
      if (data && Array.isArray(data.items)) return data.items;
      return [];
    }

    async function loadHub() {
      setStatus('管理ハブを読み込み中です...');

      const memberPromise = fetchJson(`${WEB_APP_URL}?mode=pendingMemberApplications&t=${Date.now()}`);
      const trialPromise = fetchJson(`${WEB_APP_URL}?mode=pendingTrialApplications&t=${Date.now()}`);
      const practicePromise = fetchJson(`${WEB_APP_URL}?mode=adminPractices4weeks&t=${Date.now()}`);
      const eventPromise = fetchJson(`${WEB_APP_URL}?mode=adminEventsWithParticipants&t=${Date.now()}`);

      const [memberSettled, trialSettled, practiceSettled, eventSettled] = await Promise.allSettled([
        memberPromise,
        trialPromise,
        practicePromise,
        eventPromise
      ]);

      let memberItems = [];
      let trialItems = [];
      let practiceItems = [];
      let eventItems = [];

      const errors = [];

      if (memberSettled.status === 'fulfilled') {
        memberItems = normalizeMemberItems(memberSettled.value);
      } else {
        errors.push('会員申請');
      }

      if (trialSettled.status === 'fulfilled') {
        trialItems = normalizeTrialItems(trialSettled.value).filter(function(item) {
          return String(item.applicationStatus || '') !== '体験完了';
        });
      } else {
        errors.push('無料体験申請');
      }

      if (practiceSettled.status === 'fulfilled') {
        practiceItems = normalizePracticeItems(practiceSettled.value);
      } else {
        errors.push('今後4週間の練習');
      }

      if (eventSettled.status === 'fulfilled') {
        eventItems = normalizeEventItems(eventSettled.value);
      } else {
        errors.push('公開中イベント');
      }

      document.getElementById('memberCount').textContent = memberItems.length;
      document.getElementById('trialCount').textContent = trialItems.length;
      document.getElementById('practiceCount').textContent = practiceItems.length;
      document.getElementById('eventCount').textContent = eventItems.length;

      renderMemberApplications(memberItems);
      renderTrialApplications(trialItems);
      renderPractices(practiceItems);
      renderEvents(eventItems);

      if (errors.length) {
        setStatus('一部読込に失敗しました: ' + errors.join(' / '));
      } else {
        setStatus('管理ハブを更新しました。');
      }
    }

    function renderMemberApplications(items) {
      const list = document.getElementById('memberList');

      if (!items.length) {
        list.innerHTML = '<div class="empty">確認対象の会員申請はありません。</div>';
        return;
      }

      const previewItems = items.slice(0, 6);

      list.innerHTML = previewItems.map(function(item) {
        return `
          <div class="card member">
            <div class="card-head">
              <div>
                <div class="card-title">${escapeHtml(item.childName || '氏名なし')}</div>
                <div class="card-meta">${escapeHtml(item.grade || '')} / 保護者: ${escapeHtml(item.parentName || '')}</div>
              </div>
              <div>${getStatusPill(item.applicationStatus || '')}</div>
            </div>

            <div class="info-grid">
              <div class="info-box">
                <span class="label">希望区分</span>
                <div class="value">${escapeHtml(item.desiredCategory || '未設定')}</div>
              </div>
              <div class="info-box">
                <span class="label">承認区分</span>
                <div class="value">${escapeHtml(item.approvedCategory || '未設定')}</div>
              </div>
              <div class="info-box">
                <span class="label">無料体験利用状況</span>
                <div class="value">${escapeHtml(item.trialStatus || '未設定')}</div>
              </div>
              <div class="info-box">
                <span class="label">申込日時</span>
                <div class="value">${escapeHtml(formatDateTime(item.appliedAt) || '')}</div>
              </div>
              <div class="info-box">
                <span class="label">所属</span>
                <div class="value">${escapeHtml(item.affiliation || '未記載')}</div>
              </div>
              <div class="info-box">
                <span class="label">相談・備考</span>
                <div class="value">${escapeHtml(item.note || '未記載')}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderTrialApplications(items) {
      const list = document.getElementById('trialList');

      if (!items.length) {
        list.innerHTML = '<div class="empty">対応中の無料体験申請はありません。</div>';
        return;
      }

      const previewItems = items.slice(0, 6);

      list.innerHTML = previewItems.map(function(item) {
        return `
          <div class="card trial">
            <div class="card-head">
              <div>
                <div class="card-title">${escapeHtml(item.childName || '氏名なし')}</div>
                <div class="card-meta">${escapeHtml(item.grade || '')} / 保護者: ${escapeHtml(item.parentName || '')}</div>
              </div>
              <div>${getStatusPill(item.applicationStatus || '')}</div>
            </div>

            <div class="info-grid">
              <div class="info-box">
                <span class="label">所属チーム</span>
                <div class="value">${escapeHtml(item.teamName || '未記載')}</div>
              </div>
              <div class="info-box">
                <span class="label">申請日時</span>
                <div class="value">${escapeHtml(formatDateTime(item.appliedAt) || '')}</div>
              </div>
              <div class="info-box">
                <span class="label">希望練習日</span>
                <div class="value">${escapeHtml(formatDateOnly(item.requestedPracticeDate) || '未設定')}</div>
              </div>
              <div class="info-box">
                <span class="label">希望練習ラベル</span>
                <div class="value">${escapeHtml(item.requestedPracticeLabel || '未設定')}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function participantText(list) {
      if (!Array.isArray(list) || !list.length) return 'なし';
      return list.join('、');
    }

    function toggleAccordion(id) {
      const target = document.getElementById(id);
      if (!target) return;
      target.classList.toggle('open');
    }

    function renderPractices(items) {
      const list = document.getElementById('practiceList');

      if (!items.length) {
        list.innerHTML = '<div class="empty">今後4週間の練習はありません。</div>';
        return;
      }

      list.innerHTML = items.map(function(item, index) {
        const accordionId = 'practiceAccordion_' + index;
        const timeText = `${escapeHtml(item.startTime || '')}${item.startTime && item.endTime ? '〜' : ''}${escapeHtml(item.endTime || '')}`;

        return `
          <div class="accordion-card ${index === 0 ? 'open' : ''}" id="${accordionId}">
            <button type="button" class="accordion-summary practice" onclick="toggleAccordion('${accordionId}')">
              <div class="accordion-left">
                <div class="accordion-title">${escapeHtml(formatDateOnly(item.date) || '')}｜${timeText}｜${escapeHtml(item.title || '')}</div>
                <div class="accordion-meta">参加予定 ${Number(item.participantCount || 0)}名</div>
              </div>
              <div class="accordion-arrow">⌄</div>
            </button>

            <div class="accordion-detail">
              <div class="info-grid">
                <div class="info-box">
                  <span class="label">会場</span>
                  <div class="value">${escapeHtml(item.place || '未設定')}</div>
                </div>
                <div class="info-box">
                  <span class="label">備考</span>
                  <div class="value">${escapeHtml(item.note || '未記載')}</div>
                </div>
              </div>

              <div class="participants">
                <div class="participant-row">
                  <div class="participant-label">クラブ</div>
                  <div class="participant-value">${escapeHtml(participantText(item.participants && item.participants['クラブ']))}</div>
                </div>
                <div class="participant-row">
                  <div class="participant-label">スクール</div>
                  <div class="participant-value">${escapeHtml(participantText(item.participants && item.participants['スクール']))}</div>
                </div>
                <div class="participant-row">
                  <div class="participant-label">一般</div>
                  <div class="participant-value">${escapeHtml(participantText(item.participants && item.participants['一般']))}</div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderEvents(items) {
      const list = document.getElementById('eventList');

      if (!items.length) {
        list.innerHTML = '<div class="empty">公開中イベントはありません。</div>';
        return;
      }

      list.innerHTML = items.map(function(item, index) {
        const accordionId = 'eventAccordion_' + index;
        const participants = item.participants || {};
        const timeText = `${escapeHtml(item.startTime || '')}${item.startTime && item.endTime ? '〜' : ''}${escapeHtml(item.endTime || '')}`;

        return `
          <div class="accordion-card" id="${accordionId}">
            <button type="button" class="accordion-summary event" onclick="toggleAccordion('${accordionId}')">
              <div class="accordion-left">
                <div class="accordion-title">${escapeHtml(formatDateOnly(item.eventDate) || '')}｜${timeText}｜${escapeHtml(item.eventName || 'イベント名未設定')}</div>
                <div class="accordion-meta">${escapeHtml(item.statusLabel || '受付状況未設定')}</div>
              </div>
              <div class="accordion-arrow">⌄</div>
            </button>

            <div class="accordion-detail">
              <div class="info-grid">
                <div class="info-box">
                  <span class="label">会場</span>
                  <div class="value">${escapeHtml(item.place || '未設定')}</div>
                </div>
                <div class="info-box">
                  <span class="label">対象</span>
                  <div class="value">${escapeHtml(item.targetLabel || '未設定')}</div>
                </div>
                <div class="info-box">
                  <span class="label">現在申込数 / 残数</span>
                  <div class="value">${Number(item.currentCount || 0)}名 / ${Number(item.remainingCount || 0)}枠</div>
                </div>
                <div class="info-box">
                  <span class="label">料金</span>
                  <div class="value">クラブ ${Number(item.clubPrice || 0).toLocaleString()}円 / スクール ${Number(item.schoolPrice || 0).toLocaleString()}円 / 一般 ${Number(item.generalPrice || 0).toLocaleString()}円</div>
                </div>
                <div class="info-box">
                  <span class="label">備考</span>
                  <div class="value">${escapeHtml(item.note || '未記載')}</div>
                </div>
              </div>

              <div class="participants">
                <div class="participant-row">
                  <div class="participant-label">クラブ</div>
                  <div class="participant-value">${escapeHtml(participantText(participants['クラブ']))}</div>
                </div>
                <div class="participant-row">
                  <div class="participant-label">スクール</div>
                  <div class="participant-value">${escapeHtml(participantText(participants['スクール']))}</div>
                </div>
                <div class="participant-row">
                  <div class="participant-label">一般</div>
                  <div class="participant-value">${escapeHtml(participantText(participants['一般']))}</div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    window.addEventListener('load', loadHub);
  </script>
</body>
</html>
