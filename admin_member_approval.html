<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会員申込 承認管理</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
      font-size: 16px;
      background: #f7f9fc;
      color: #1f2937;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 8px;
      text-align: center;
    }

    .sub {
      text-align: center;
      color: #4b5563;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .top-actions button {
      flex: 1;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      padding: 18px;
      margin-bottom: 16px;
    }

    .row {
      margin-bottom: 8px;
    }

    .label {
      font-weight: 700;
      color: #374151;
      margin-right: 6px;
    }

    .note {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
      white-space: pre-wrap;
      min-height: 24px;
    }

    .action-area {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #e5e7eb;
    }

    select, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      margin-top: 10px;
    }

    button {
      border: none;
      background: #2563eb;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .status {
      margin: 16px 0 22px;
      font-size: 14px;
      white-space: pre-wrap;
      text-align: center;
    }

    .empty {
      text-align: center;
      color: #6b7280;
      padding: 30px 16px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .pill-received {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .pill-checking {
      background: #fef3c7;
      color: #b45309;
    }

    .pill-approved {
      background: #dcfce7;
      color: #15803d;
    }

    .pill-returned {
      background: #fee2e2;
      color: #b91c1c;
    }

    .pill-rejected {
      background: #e5e7eb;
      color: #374151;
    }

    .pill-default {
      background: #e5e7eb;
      color: #374151;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>会員申込 承認管理</h1>
    <div class="sub">受付・確認中・承認未反映の会員申込を管理します</div>

    <div class="top-actions">
      <button class="secondary" onclick="loadApplications()">一覧を更新</button>
    </div>

    <div id="status" class="status">読み込み中です...</div>
    <div id="listArea"></div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyg0g1BMLA8HIVB13iyN4IbEcG7rOKG8m5NzUNl7a9U_ovSGno5c7pd1Vd7Woqo8brf/exec';

    function setStatus(message) {
      document.getElementById('status').textContent = message;
    }

    function formatJapanDate(isoString) {
      if (!isoString) return '';
      const date = new Date(isoString);
      if (isNaN(date.getTime())) return isoString;

      return new Intl.DateTimeFormat('ja-JP', {
        timeZone: 'Asia/Tokyo',
        year: 'numeric',
        month: 'numeric',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit'
      }).format(date);
    }

    function getStatusPillClass(status) {
      switch (status) {
        case '受付':
          return 'pill pill-received';
        case '確認中':
          return 'pill pill-checking';
        case '承認':
          return 'pill pill-approved';
        case '差戻し':
          return 'pill pill-returned';
        case '見送り':
          return 'pill pill-rejected';
        default:
          return 'pill pill-default';
      }
    }

    async function loadApplications() {
      setStatus('一覧を読み込み中です...');
      const listArea = document.getElementById('listArea');
      listArea.innerHTML = '';

      try {
        const response = await fetch(`${WEB_APP_URL}?mode=pendingMemberApplications`);
        const result = await response.json();

        if (!result.ok) {
          setStatus(`読込エラー: ${result.message || '不明なエラー'}`);
          return;
        }

        const items = result.items || [];

        if (items.length === 0) {
          listArea.innerHTML = '<div class="empty">対象の会員申込はありません。</div>';
          setStatus('対象の会員申込はありません。');
          return;
        }

        items.forEach((item, index) => {
          const card = document.createElement('div');
          card.className = 'card';

          const approvedCategoryOptions = `
            <option value="">承認区分を選択</option>
            <option value="クラブ" ${item.approvedCategory === 'クラブ' ? 'selected' : ''}>クラブ</option>
            <option value="スクール" ${item.approvedCategory === 'スクール' ? 'selected' : ''}>スクール</option>
            <option value="一般" ${item.approvedCategory === '一般' ? 'selected' : ''}>一般</option>
          `;

          const applicationStatusOptions = `
            <option value="受付" ${item.applicationStatus === '受付' ? 'selected' : ''}>受付</option>
            <option value="確認中" ${item.applicationStatus === '確認中' ? 'selected' : ''}>確認中</option>
            <option value="承認" ${item.applicationStatus === '承認' ? 'selected' : ''}>承認</option>
            <option value="差戻し" ${item.applicationStatus === '差戻し' ? 'selected' : ''}>差戻し</option>
            <option value="見送り" ${item.applicationStatus === '見送り' ? 'selected' : ''}>見送り</option>
          `;

          const canApprove = item.applicationStatus === '承認' && item.reflected === false;
          const noteText = item.note || '記載なし';
          const formattedAppliedAt = formatJapanDate(item.appliedAt);
          const statusClass = getStatusPillClass(item.applicationStatus);

          card.innerHTML = `
            <div class="row"><span class="label">子ども氏名:</span>${item.childName || ''}</div>
            <div class="row"><span class="label">学年:</span>${item.grade || ''}</div>
            <div class="row"><span class="label">保護者氏名:</span>${item.parentName || ''}</div>
            <div class="row"><span class="label">希望区分:</span>${item.desiredCategory || ''}</div>
            <div class="row"><span class="label">現在の申込ステータス:</span><span class="${statusClass}">${item.applicationStatus || ''}</span></div>
            <div class="row"><span class="label">現在の承認区分:</span>${item.approvedCategory || '未設定'}</div>
            <div class="row"><span class="label">無料体験:</span>${item.trialStatus || ''}</div>
            <div class="row"><span class="label">所属:</span>${item.affiliation || ''}</div>
            <div class="row"><span class="label">申込日時:</span>${formattedAppliedAt || ''}</div>
            <div class="row"><span class="label">備考:</span></div>
            <div class="note">${noteText}</div>

            <div class="action-area">
              <select id="status_${index}">
                ${applicationStatusOptions}
              </select>

              <select id="category_${index}">
                ${approvedCategoryOptions}
              </select>

              <button class="secondary" onclick="saveStatus('${item.pageId}', ${index})">
                ステータスを保存
              </button>

              <button id="approveBtn_${index}" onclick="approveApplication('${item.pageId}', ${index})" ${canApprove ? '' : 'disabled'}>
                承認して会員マスタへ反映
              </button>
            </div>
          `;

          listArea.appendChild(card);
        });

        setStatus(`${items.length}件を表示しています。`);
      } catch (error) {
        setStatus(`読込エラー: ${error.message}`);
      }
    }

    async function saveStatus(pageId, index) {
      const applicationStatus = document.getElementById(`status_${index}`).value;
      const approvedCategory = document.getElementById(`category_${index}`).value;

      setStatus('ステータスを保存中です...');

      try {
        const form = new FormData();
        form.append('action', 'updateMemberApplicationStatus');
        form.append('pageId', pageId);
        form.append('applicationStatus', applicationStatus);
        form.append('approvedCategory', approvedCategory);

        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: form
        });

        const result = await response.json();

        if (!result.ok) {
          setStatus(`保存エラー: ${result.message || '不明なエラー'}`);
          return;
        }

        setStatus('ステータスを保存しました。');
        await loadApplications();
      } catch (error) {
        setStatus(`保存エラー: ${error.message}`);
      }
    }

    async function approveApplication(pageId, index) {
      const approvedCategory = document.getElementById(`category_${index}`).value;

      if (!approvedCategory) {
        setStatus('承認区分を選択してください。');
        return;
      }

      setStatus('承認処理を実行中です...');

      try {
        const form = new FormData();
        form.append('action', 'approveMemberApplication');
        form.append('pageId', pageId);
        form.append('approvedCategory', approvedCategory);

        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: form
        });

        const result = await response.json();

        if (!result.ok) {
          setStatus(`承認エラー: ${result.message || '不明なエラー'}`);
          return;
        }

        setStatus('承認が完了しました。一覧を更新します。');
        await loadApplications();
      } catch (error) {
        setStatus(`承認エラー: ${error.message}`);
      }
    }

    window.addEventListener('load', loadApplications);
  </script>
</body>
</html>
