<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会員申込 承認管理</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
      font-size: 16px;
      background: #f7f9fc;
      color: #1f2937;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 8px;
      text-align: center;
    }

    .sub {
      text-align: center;
      color: #4b5563;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .top-actions button {
      flex: 1;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      padding: 18px;
      margin-bottom: 16px;
    }

    .row {
      margin-bottom: 8px;
    }

    .label {
      font-weight: 700;
      color: #374151;
      margin-right: 6px;
    }

    .note {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
      white-space: pre-wrap;
    }

    .action-area {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #e5e7eb;
    }

    select, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
    }

    button {
      border: none;
      background: #2563eb;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .status {
      margin: 16px 0 22px;
      font-size: 14px;
      white-space: pre-wrap;
      text-align: center;
    }

    .empty {
      text-align: center;
      color: #6b7280;
      padding: 30px 16px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>会員申込 承認管理</h1>
    <div class="sub">承認待ちの会員申込を確認し、そのまま会員マスタへ反映します</div>

    <div class="top-actions">
      <button class="secondary" onclick="loadPendingApplications()">一覧を更新</button>
    </div>

    <div id="status" class="status">読み込み中です...</div>
    <div id="listArea"></div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyg0g1BMLA8HIVB13iyN4IbEcG7rOKG8m5NzUNl7a9U_ovSGno5c7pd1Vd7Woqo8brf/exec';

    function setStatus(message) {
      document.getElementById('status').textContent = message;
    }

    async function loadPendingApplications() {
      setStatus('承認待ちを読み込み中です...');
      const listArea = document.getElementById('listArea');
      listArea.innerHTML = '';

      try {
        const response = await fetch(`${WEB_APP_URL}?mode=pendingMemberApplications`);
        const result = await response.json();

        if (!result.ok) {
          setStatus(`読込エラー: ${result.message || '不明なエラー'}`);
          return;
        }

        const items = result.items || [];

        if (items.length === 0) {
          listArea.innerHTML = '<div class="empty">承認待ちの会員申込はありません。</div>';
          setStatus('承認待ちはありません。');
          return;
        }

        items.forEach((item, index) => {
          const card = document.createElement('div');
          card.className = 'card';

          card.innerHTML = `
            <div class="row"><span class="label">子ども氏名:</span>${item.childName || ''}</div>
            <div class="row"><span class="label">学年:</span>${item.grade || ''}</div>
            <div class="row"><span class="label">保護者氏名:</span>${item.parentName || ''}</div>
            <div class="row"><span class="label">希望区分:</span>${item.desiredCategory || ''}</div>
            <div class="row"><span class="label">無料体験:</span>${item.trialStatus || ''}</div>
            <div class="row"><span class="label">所属:</span>${item.affiliation || ''}</div>
            <div class="row"><span class="label">申込日時:</span>${item.appliedAt || ''}</div>
            <div class="row"><span class="label">備考:</span></div>
            <div class="note">${item.note || ''}</div>

            <div class="action-area">
              <select id="category_${index}">
                <option value="">承認区分を選択</option>
                <option value="クラブ">クラブ</option>
                <option value="スクール">スクール</option>
                <option value="一般">一般</option>
              </select>
              <button id="approveBtn_${index}" onclick="approveApplication('${item.pageId}', ${index})">
                この申込を承認して会員マスタへ反映
              </button>
            </div>
          `;

          listArea.appendChild(card);
        });

        setStatus(`${items.length}件の承認待ちがあります。`);
      } catch (error) {
        setStatus(`読込エラー: ${error.message}`);
      }
    }

    async function approveApplication(pageId, index) {
      const categorySelect = document.getElementById(`category_${index}`);
      const approveBtn = document.getElementById(`approveBtn_${index}`);
      const category = categorySelect.value;

      if (!category) {
        setStatus('承認区分を選択してください。');
        return;
      }

      approveBtn.disabled = true;
      setStatus('承認処理を実行中です...');

      try {
        const form = new FormData();
        form.append('action', 'approveMemberApplication');
        form.append('pageId', pageId);
        form.append('approvedCategory', category);

        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: form
        });

        const result = await response.json();

        if (!result.ok) {
          setStatus(`承認エラー: ${result.message || '不明なエラー'}`);
          approveBtn.disabled = false;
          return;
        }

        setStatus('承認が完了しました。一覧を更新します。');
        await loadPendingApplications();
      } catch (error) {
        setStatus(`承認エラー: ${error.message}`);
        approveBtn.disabled = false;
      }
    }

    window.addEventListener('load', loadPendingApplications);
  </script>
</body>
</html>
