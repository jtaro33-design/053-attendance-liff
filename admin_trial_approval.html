<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無料体験 承認管理</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
      line-height: 1.6;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      color: #0f172a;
    }

    .sub {
      margin-top: 4px;
      font-size: 13px;
      color: #475569;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn,
    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    .btn,
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .secondary:hover {
      background: #cbd5e1;
    }

    .primary {
      background: #0f172a;
      color: #ffffff;
    }

    .primary:hover {
      opacity: 0.92;
    }

    .ghost {
      background: #fff;
      color: #334155;
      border: 1px solid #cbd5e1;
    }

    .ghost:hover {
      background: #f8fafc;
    }

    a.btn-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
    }

    .summary-bar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
    }

    .summary-label {
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      margin-bottom: 6px;
    }

    .summary-value {
      font-size: 28px;
      font-weight: 800;
      color: #0f172a;
      line-height: 1;
    }

    .summary-note {
      margin-top: 6px;
      font-size: 12px;
      color: #64748b;
    }

    .status {
      margin-bottom: 16px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      color: #334155;
      white-space: pre-wrap;
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }

    .filter-chip {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #334155;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .filter-chip.active {
      background: #0f172a;
      border-color: #0f172a;
      color: #fff;
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.05);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .name {
      font-size: 18px;
      font-weight: 800;
      color: #0f172a;
    }

    .meta {
      margin-top: 4px;
      font-size: 13px;
      color: #64748b;
    }

    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill-received { background: #dbeafe; color: #1d4ed8; }
    .pill-checking { background: #fef3c7; color: #b45309; }
    .pill-approved { background: #dcfce7; color: #15803d; }
    .pill-returned { background: #fee2e2; color: #b91c1c; }
    .pill-rejected { background: #e5e7eb; color: #374151; }
    .pill-cancelled { background: #ede9fe; color: #6d28d9; }
    .pill-completed { background: #cffafe; color: #0f766e; }
    .pill-default { background: #e5e7eb; color: #374151; }

    .info-grid,
    .manage-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 16px;
    }

    .info-grid {
      margin-bottom: 12px;
    }

    .info-box,
    .manage-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 76px;
    }

    .manage-box {
      background: #fff;
      border-left: 4px solid #94a3b8;
    }

    .label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      color: #64748b;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    .value {
      font-size: 14px;
      font-weight: 600;
      color: #0f172a;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .field,
    .field-textarea,
    .field-check {
      width: 100%;
    }

    .field,
    .field-textarea {
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #ffffff;
      color: #0f172a;
      padding: 10px 12px;
      font-size: 14px;
    }

    .field-textarea {
      min-height: 96px;
      resize: vertical;
    }

    .field-check-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 8px;
    }

    .save-row {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      align-items: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .save-status {
      font-size: 12px;
      color: #64748b;
      min-height: 18px;
    }

    .empty {
      text-align: center;
      background: #fff;
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      padding: 40px 16px;
      color: #64748b;
      font-size: 14px;
    }

    @media (max-width: 720px) {
      .summary-bar,
      .info-grid,
      .manage-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-head">
      <div>
        <h1>無料体験 承認管理</h1>
        <div class="sub">無料体験申請の確認・整理・承認準備を行います</div>
      </div>
      <div class="top-actions">
        <a href="./admin_hub.html" class="btn-link ghost">← 管理ハブへ戻る</a>
        <button class="secondary" onclick="loadTrialApplications()">一覧を更新</button>
      </div>
    </div>

    <div class="summary-bar">
      <div class="summary-card">
        <div class="summary-label">表示件数</div>
        <div class="summary-value" id="summaryCount">-</div>
        <div class="summary-note">現在のフィルタ適用後</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">受付 / 確認中</div>
        <div class="summary-value" id="summaryOpen">-</div>
        <div class="summary-note">優先して確認したい件数</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">一覧状態</div>
        <div class="summary-value" id="summaryState" style="font-size:18px;line-height:1.3;">読込前</div>
        <div class="summary-note">最後の処理結果を表示</div>
      </div>
    </div>

    <div id="status" class="status">読み込み中です。</div>

    <div class="filters" id="filters">
      <button class="filter-chip active" data-filter="all" onclick="setFilter('all')">すべて</button>
      <button class="filter-chip" data-filter="受付" onclick="setFilter('受付')">受付</button>
      <button class="filter-chip" data-filter="確認中" onclick="setFilter('確認中')">確認中</button>
      <button class="filter-chip" data-filter="承認" onclick="setFilter('承認')">承認</button>
      <button class="filter-chip" data-filter="差戻し" onclick="setFilter('差戻し')">差戻し</button>
      <button class="filter-chip" data-filter="見送り" onclick="setFilter('見送り')">見送り</button>
      <button class="filter-chip" data-filter="キャンセル" onclick="setFilter('キャンセル')">キャンセル</button>
      <button class="filter-chip" data-filter="体験完了" onclick="setFilter('体験完了')">体験完了</button>
    </div>

    <div id="listArea" class="list"></div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyg0g1BMLA8HIVB13iyN4IbEcG7rOKG8m5NzUNl7a9U_ovSGno5c7pd1Vd7Woqo8brf/exec';

    let allItems = [];
    let currentFilter = 'all';

    function setStatus(message) {
      document.getElementById('status').textContent = message;
      document.getElementById('summaryState').textContent = message;
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatJapanDate(isoString) {
      if (!isoString) return '';
      const date = new Date(isoString);
      if (isNaN(date.getTime())) return isoString;

      return new Intl.DateTimeFormat('ja-JP', {
        timeZone: 'Asia/Tokyo',
        year: 'numeric',
        month: 'numeric',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit'
      }).format(date);
    }

    function formatDateOnly(dateString) {
      if (!dateString) return '';
      const d = new Date(dateString + 'T00:00:00');
      if (isNaN(d.getTime())) return dateString;

      return new Intl.DateTimeFormat('ja-JP', {
        timeZone: 'Asia/Tokyo',
        month: 'numeric',
        day: 'numeric',
        weekday: 'short'
      }).format(d);
    }

    function getStatusPillClass(status) {
      switch (status) {
        case '受付':
          return 'pill pill-received';
        case '確認中':
          return 'pill pill-checking';
        case '承認':
          return 'pill pill-approved';
        case '差戻し':
          return 'pill pill-returned';
        case '見送り':
          return 'pill pill-rejected';
        case 'キャンセル':
          return 'pill pill-cancelled';
        case '体験完了':
          return 'pill pill-completed';
        default:
          return 'pill pill-default';
      }
    }

    function updateSummary(items) {
      const openCount = allItems.filter(function(item) {
        return item.applicationStatus === '受付' || item.applicationStatus === '確認中';
      }).length;

      document.getElementById('summaryCount').textContent = items.length;
      document.getElementById('summaryOpen').textContent = openCount;
    }

    function setFilter(filterKey) {
      currentFilter = filterKey;
      document.querySelectorAll('.filter-chip').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.filter === filterKey);
      });
      renderList();
    }

    function getFilteredItems() {
      if (currentFilter === 'all') return allItems.slice();
      return allItems.filter(function(item) {
        return item.applicationStatus === currentFilter;
      });
    }

    async function loadTrialApplications() {
      setStatus('一覧を読み込み中です。');
      document.getElementById('listArea').innerHTML = '';

      try {
        const response = await fetch(`${WEB_APP_URL}?mode=pendingTrialApplications`);
        const result = await response.json();

        if (!result.ok) {
          setStatus(`読込エラー: ${result.message || '不明なエラー'}`);
          allItems = [];
          renderList();
          return;
        }

        allItems = Array.isArray(result.items) ? result.items : [];
        renderList();
      } catch (error) {
        allItems = [];
        setStatus(`読込エラー: ${error.message}`);
        renderList();
      }
    }

    async function saveTrialApplication(pageId, buttonEl) {
      const statusSelect = document.getElementById(`applicationStatus-${pageId}`);
      const adminMemo = document.getElementById(`adminMemo-${pageId}`);
      const approvedPracticeId = document.getElementById(`approvedPracticeId-${pageId}`);
      const approvedPracticeDate = document.getElementById(`approvedPracticeDate-${pageId}`);
      const approvedPracticeLabel = document.getElementById(`approvedPracticeLabel-${pageId}`);
      const replyDraft = document.getElementById(`replyDraft-${pageId}`);
      const replySent = document.getElementById(`replySent-${pageId}`);
      const trialCompletedDate = document.getElementById(`trialCompletedDate-${pageId}`);
      const saveStatus = document.getElementById(`saveStatus-${pageId}`);

      if (!pageId) {
        alert('pageId が取得できませんでした');
        return;
      }

      buttonEl.disabled = true;
      saveStatus.textContent = '保存中です...';

      try {
        const body = new URLSearchParams();
        body.append('action', 'updateTrialApplicationAdminFields');
        body.append('pageId', pageId);
        body.append('applicationStatus', statusSelect ? statusSelect.value : '');
        body.append('adminMemo', adminMemo ? adminMemo.value : '');
        body.append('approvedPracticeId', approvedPracticeId ? approvedPracticeId.value : '');
        body.append('approvedPracticeDate', approvedPracticeDate ? approvedPracticeDate.value : '');
        body.append('approvedPracticeLabel', approvedPracticeLabel ? approvedPracticeLabel.value : '');
        body.append('replyDraft', replyDraft ? replyDraft.value : '');
        body.append('replySent', replySent && replySent.checked ? 'true' : 'false');
        body.append('trialCompletedDate', trialCompletedDate ? trialCompletedDate.value : '');

        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
          },
          body: body.toString()
        });

        const result = await response.json();

        if (!result.ok) {
          saveStatus.textContent = `保存失敗: ${result.message || '不明なエラー'}`;
          buttonEl.disabled = false;
          return;
        }

        saveStatus.textContent = '保存しました';

        allItems = allItems.map(function(item) {
          if (item.pageId !== pageId) return item;
          return {
            ...item,
            applicationStatus: statusSelect ? statusSelect.value : item.applicationStatus,
            adminMemo: adminMemo ? adminMemo.value : item.adminMemo,
            approvedPracticeId: approvedPracticeId ? approvedPracticeId.value : item.approvedPracticeId,
            approvedPracticeDate: approvedPracticeDate ? approvedPracticeDate.value : item.approvedPracticeDate,
            approvedPracticeLabel: approvedPracticeLabel ? approvedPracticeLabel.value : item.approvedPracticeLabel,
            replyDraft: replyDraft ? replyDraft.value : item.replyDraft,
            replySent: !!(replySent && replySent.checked),
            trialCompletedDate: trialCompletedDate ? trialCompletedDate.value : item.trialCompletedDate
          };
        });

        setTimeout(function() {
          renderList();
        }, 300);
      } catch (error) {
        saveStatus.textContent = `保存失敗: ${error.message}`;
      } finally {
        buttonEl.disabled = false;
      }
    }

    function fillApprovedFromRequested(pageId) {
      const sourceId = document.getElementById(`requestedPracticeId-${pageId}`);
      const sourceDate = document.getElementById(`requestedPracticeDateRaw-${pageId}`);
      const sourceLabel = document.getElementById(`requestedPracticeLabelRaw-${pageId}`);

      const targetId = document.getElementById(`approvedPracticeId-${pageId}`);
      const targetDate = document.getElementById(`approvedPracticeDate-${pageId}`);
      const targetLabel = document.getElementById(`approvedPracticeLabel-${pageId}`);

      if (targetId && sourceId) targetId.value = sourceId.value || '';
      if (targetDate && sourceDate) targetDate.value = sourceDate.value || '';
      if (targetLabel && sourceLabel) targetLabel.value = sourceLabel.value || '';
    }

    function createReplyDraft(pageId) {
  const approvedPracticeDateEl = document.getElementById(`approvedPracticeDate-${pageId}`);
  const approvedPracticeLabelEl = document.getElementById(`approvedPracticeLabel-${pageId}`);
  const requestedPracticeDateEl = document.getElementById(`requestedPracticeDateRaw-${pageId}`);
  const requestedPracticeLabelEl = document.getElementById(`requestedPracticeLabelRaw-${pageId}`);
  const replyDraftEl = document.getElementById(`replyDraft-${pageId}`);

  if (!replyDraftEl) return;

  const approvedPracticeDate = approvedPracticeDateEl ? approvedPracticeDateEl.value.trim() : '';
  const approvedPracticeLabel = approvedPracticeLabelEl ? approvedPracticeLabelEl.value.trim() : '';
  const requestedPracticeDate = requestedPracticeDateEl ? requestedPracticeDateEl.value.trim() : '';
  const requestedPracticeLabel = requestedPracticeLabelEl ? requestedPracticeLabelEl.value.trim() : '';

  const finalDate = approvedPracticeDate || requestedPracticeDate;
  const finalLabel = approvedPracticeLabel || requestedPracticeLabel;

  let scheduleText = '';
  if (finalLabel) {
    scheduleText = finalLabel;
  } else if (finalDate) {
    scheduleText = formatDateOnly(finalDate);
  }

  let draft = '無料体験のお申し込みありがとうございます。\n';

  if (scheduleText) {
    draft += scheduleText + ' でご案内予定です。\n';
  } else {
    draft += '体験日程は内容確認のうえ、改めてご案内いたします。\n';
  }

  draft += 'まずは一度、実際の練習の雰囲気を見ていただければと思います。\n';
  draft += 'ご不明点があれば、このLINEにご返信ください。';

  replyDraftEl.value = draft;
}

    function renderList() {
      const listArea = document.getElementById('listArea');
      const items = getFilteredItems();
      listArea.innerHTML = '';

      updateSummary(items);

      if (!items.length) {
        listArea.innerHTML = '<div class="empty">該当する無料体験申請はありません。</div>';
        setStatus('該当する無料体験申請はありません。');
        return;
      }

      items.forEach(function(item) {
        const card = document.createElement('div');
        card.className = 'card';

        const statusClass = getStatusPillClass(item.applicationStatus);
        const appliedAtText = formatJapanDate(item.appliedAt);
        const requestedDateText = formatDateOnly(item.requestedPracticeDate);
        const approvedDateText = formatDateOnly(item.approvedPracticeDate);
        const trialCompletedText = formatDateOnly(item.trialCompletedDate);

        card.innerHTML = `
          <div class="card-head">
            <div>
              <div class="name">${escapeHtml(item.childName || '氏名なし')}</div>
              <div class="meta">
                ${escapeHtml(item.grade || '')}　
                保護者: ${escapeHtml(item.parentName || '')}
              </div>
            </div>
            <div>
              <span class="${statusClass}">${escapeHtml(item.applicationStatus || '不明')}</span>
            </div>
          </div>

          <div class="info-grid">
            <div class="info-box">
              <span class="label">所属チーム</span>
              <div class="value">${escapeHtml(item.teamName || '未記載')}</div>
            </div>
            <div class="info-box">
              <span class="label">申請日時</span>
              <div class="value">${escapeHtml(appliedAtText || '')}</div>
            </div>
            <div class="info-box">
              <span class="label">希望練習日</span>
              <div class="value">${escapeHtml(requestedDateText || '未設定')}</div>
            </div>
            <div class="info-box">
              <span class="label">希望練習ラベル</span>
              <div class="value">${escapeHtml(item.requestedPracticeLabel || '未設定')}</div>
            </div>
            <div class="info-box">
              <span class="label">LINE userID</span>
              <div class="value">${escapeHtml(item.lineUserId || '未設定')}</div>
            </div>
            <div class="info-box">
              <span class="label">希望練習ID</span>
              <div class="value">${escapeHtml(item.requestedPracticeId || '未設定')}</div>
            </div>
          </div>

          <input type="hidden" id="requestedPracticeId-${item.pageId}" value="${escapeHtml(item.requestedPracticeId || '')}">
          <input type="hidden" id="requestedPracticeDateRaw-${item.pageId}" value="${escapeHtml(item.requestedPracticeDate || '')}">
          <input type="hidden" id="requestedPracticeLabelRaw-${item.pageId}" value="${escapeHtml(item.requestedPracticeLabel || '')}">

          <div class="manage-grid">
            <div class="manage-box">
              <span class="label">申請ステータス</span>
              <select class="field" id="applicationStatus-${item.pageId}">
                <option value="受付" ${item.applicationStatus === '受付' ? 'selected' : ''}>受付</option>
                <option value="確認中" ${item.applicationStatus === '確認中' ? 'selected' : ''}>確認中</option>
                <option value="承認" ${item.applicationStatus === '承認' ? 'selected' : ''}>承認</option>
                <option value="差戻し" ${item.applicationStatus === '差戻し' ? 'selected' : ''}>差戻し</option>
                <option value="見送り" ${item.applicationStatus === '見送り' ? 'selected' : ''}>見送り</option>
                <option value="キャンセル" ${item.applicationStatus === 'キャンセル' ? 'selected' : ''}>キャンセル</option>
                <option value="体験完了" ${item.applicationStatus === '体験完了' ? 'selected' : ''}>体験完了</option>
              </select>
            </div>

            <div class="manage-box">
              <span class="label">承認練習日</span>
              <input class="field" type="date" id="approvedPracticeDate-${item.pageId}" value="${escapeHtml(item.approvedPracticeDate || '')}">
            </div>

            <div class="manage-box">
              <span class="label">管理者メモ</span>
              <textarea class="field-textarea" id="adminMemo-${item.pageId}" placeholder="確認内容、連絡メモなど">${escapeHtml(item.adminMemo || '')}</textarea>
            </div>

            <div class="manage-box">
              <span class="label">承認練習ID</span>
              <input class="field" type="text" id="approvedPracticeId-${item.pageId}" value="${escapeHtml(item.approvedPracticeId || '')}" placeholder="承認する練習ID">
            </div>

            <div class="manage-box">
              <span class="label">承認練習ラベル</span>
              <textarea class="field-textarea" id="approvedPracticeLabel-${item.pageId}" placeholder="承認する練習の日時・会場ラベル">${escapeHtml(item.approvedPracticeLabel || '')}</textarea>
              <div class="save-row" style="justify-content:flex-start; margin-top:8px;">
                <button type="button" class="ghost" onclick="fillApprovedFromRequested('${item.pageId}')">希望内容を反映</button>
              </div>
            </div>

            <div class="manage-box">
              <span class="label">返信文下書き</span>
              <textarea class="field-textarea" id="replyDraft-${item.pageId}" placeholder="承認後に送る文面の下書き">${escapeHtml(item.replyDraft || '')}</textarea>
              <div class="save-row" style="justify-content:flex-start; margin-top:8px;">
                <button type="button" class="ghost" onclick="createReplyDraft('${item.pageId}')">返信文下書きを作成</button>
              </div>
            </div>

            <div class="manage-box">
              <span class="label">返信済み</span>
              <div class="field-check-wrap">
                <input type="checkbox" id="replySent-${item.pageId}" ${item.replySent ? 'checked' : ''}>
                <label for="replySent-${item.pageId}" style="font-size:14px;color:#0f172a;">返信済みにする</label>
              </div>
            </div>

            <div class="manage-box">
              <span class="label">体験実施日</span>
              <input class="field" type="date" id="trialCompletedDate-${item.pageId}" value="${escapeHtml(item.trialCompletedDate || '')}">
              <div class="value" style="margin-top:8px;color:#64748b;font-size:12px;">
                現在表示: ${escapeHtml(trialCompletedText || '未設定')}
              </div>
            </div>
          </div>

          <div class="save-row">
            <span class="save-status" id="saveStatus-${item.pageId}"></span>
            <button type="button" class="primary" onclick="saveTrialApplication('${item.pageId}', this)">保存</button>
          </div>
        `;

        listArea.appendChild(card);
      });

      setStatus(`${items.length}件を表示しています。`);
    }

    window.addEventListener('load', loadTrialApplications);
  </script>
</body>
</html>
