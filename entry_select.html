<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>053 申込メニュー</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      background: #f7f9fc;
      color: #1f2937;
      line-height: 1.6;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    .hero {
      background: #ffffff;
      border-radius: 20px;
      padding: 28px 22px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      text-align: center;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 10px;
    }

    .sub {
      font-size: 15px;
      color: #4b5563;
    }

    .menu-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      margin-bottom: 16px;
    }

    .menu-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .menu-text {
      font-size: 15px;
      color: #4b5563;
      margin-bottom: 16px;
    }

    a.button {
      display: block;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      padding: 14px;
      border-radius: 12px;
      background: #2563eb;
      color: #ffffff;
    }

    .button.secondary {
      background: #0f766e;
    }

    .note {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>053 申込メニュー</h1>
      <div class="sub">
        ご希望の申込項目を選択してください
      </div>
    </div>

    <div class="menu-card">
      <div class="menu-title">通常練習</div>
      <div class="menu-text">
        通常練習への参加申込はこちらです。<br>
        日程を選んで、そのまま申込できます。
      </div>
      <a class="button" href="./index.html">通常練習へ進む</a>
    </div>

    <div class="menu-card">
      <div class="menu-title">クリニック / イベント</div>
      <div class="menu-text">
        クリニックや特別イベントの一覧はこちらです。<br>
        公開中のイベントのみ表示されます。
      </div>
      <a class="button secondary" href="./event_list.html">イベント一覧へ進む</a>
    </div>

    <div class="note">
      会員申込フォームとは別の入口です
    </div>
  </div>
</body>
</html>
