<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>053 申込メニュー</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      background: #f7f9fc;
      color: #1f2937;
      line-height: 1.6;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    .hero, .status-card, .debug-card, .menu-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      margin-bottom: 16px;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 10px;
      text-align: center;
    }

    .sub {
      font-size: 15px;
      color: #4b5563;
      text-align: center;
    }

    .status-title, .debug-title {
      font-size: 14px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 8px;
    }

    .status-text, .debug-text {
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .ok { color: #065f46; font-weight: 700; }
    .warn { color: #92400e; font-weight: 700; }
    .error { color: #b91c1c; font-weight: 700; }

    .menu-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .menu-text {
      font-size: 15px;
      color: #4b5563;
      margin-bottom: 16px;
    }

    a.button,
    button.button {
      display: block;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      padding: 14px;
      border-radius: 12px;
      background: #2563eb;
      color: #ffffff;
      border: none;
      cursor: pointer;
    }

    .button.secondary { background: #0f766e; }
    .button.gray { background: #e5e7eb; color: #111827; }
    .button:disabled { background: #94a3b8; color: #ffffff; cursor: not-allowed; }

    .note {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>053 申込メニュー</h1>
      <div class="sub">ご希望の申込項目を選択してください</div>
    </div>

    <div class="status-card">
      <div class="status-title">LINE連携状態</div>
      <div id="liffStatus" class="status-text">確認中です...</div>
    </div>

    <div class="debug-card">
      <div class="debug-title">LIFFデバッグ情報</div>
      <div id="debugInfo" class="debug-text">まだ実行されていません。</div>
    </div>

    <div class="menu-card">
      <div class="menu-title">通常練習</div>
      <div class="menu-text">
        通常練習への参加申込はこちらです。<br>
        日程を選んで、そのまま申込できます。
      </div>
      <a id="practiceLink" class="button" href="./index.html">通常練習へ進む</a>
    </div>

    <div class="menu-card">
      <div class="menu-title">クリニック / イベント</div>
      <div class="menu-text">
        クリニックや特別イベントの一覧はこちらです。<br>
        公開中のイベントのみ表示されます。
      </div>
      <a id="eventLink" class="button secondary" href="./event_list.html">イベント一覧へ進む</a>
    </div>

    <div class="menu-card">
      <div class="menu-title">会員申込</div>
      <div class="menu-text">
        スクール・クラブをご希望の方はこちらからお申し込みください。
      </div>
      <a id="memberLink" class="button gray" href="./member_application.html">会員申込へ進む</a>
    </div>

    <div class="note">
      まずはLIFF URLから開いて、デバッグ情報を確認してください
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    var LIFF_ID = '2009553339-B6WeOFlT';

    /* ========================================
     * 再ログイン試行管理（無限ループ防止）
     * sessionStorage で「1回再ログインを試みた」を記録する。
     * 成功したらフラグをクリア。
     * 2回目の失敗ではループせずエラー表示で停止。
     * ======================================== */
    var RETRY_KEY = 'liff_login_retry';

    function hasAlreadyRetried() {
      try { return sessionStorage.getItem(RETRY_KEY) === '1'; }
      catch (e) { return false; }
    }

    function markRetried() {
      try { sessionStorage.setItem(RETRY_KEY, '1'); }
      catch (e) {}
    }

    function clearRetryFlag() {
      try { sessionStorage.removeItem(RETRY_KEY); }
      catch (e) {}
    }

    /* ========================================
     * UI更新
     * ======================================== */
    function setLiffStatus(message, className) {
      var el = document.getElementById('liffStatus');
      el.textContent = message;
      el.className = 'status-text ' + (className || '');
    }

    function setDebugInfo(lines) {
      document.getElementById('debugInfo').textContent = lines.join('\n');
    }

    function setLinksEnabled(enabled) {
      var ids = ['practiceLink', 'eventLink', 'memberLink'];
      ids.forEach(function(id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.style.pointerEvents = enabled ? 'auto' : 'none';
        el.style.opacity = enabled ? '1' : '0.6';
      });
    }

    /* ========================================
     * エラー判定
     * ======================================== */
    function isTokenError(error) {
      if (!error || !error.message) return false;
      var msg = error.message.toLowerCase();
      return msg.indexOf('expired') !== -1 ||
             msg.indexOf('invalid token') !== -1 ||
             msg.indexOf('access token') !== -1;
    }

    /* ========================================
     * LIFF初期化メイン
     *
     * 方針:
     * 1. liff.init() する
     * 2. 未ログインなら liff.login()
     * 3. ログイン済みなら getProfile() を試みる
     * 4. getProfile() が expired で失敗したら、
     *    1回だけ logout → login を試みる（sessionStorageで管理）
     * 5. 2回目の失敗はループせずエラー表示で停止
     * ======================================== */
    async function initLiffEntry() {
      var debug = [];
      try {
        setLinksEnabled(false);
        setLiffStatus('LIFF初期化中です...', 'warn');

        debug.push('location.href: ' + location.href);
        debug.push('userAgent: ' + navigator.userAgent);
        debug.push('LIFF_ID: ' + LIFF_ID);
        debug.push('window.liff exists: ' + (!!window.liff));
        debug.push('retried: ' + hasAlreadyRetried());

        if (!window.liff) {
          debug.push('LIFF SDK が読み込めていません。');
          setDebugInfo(debug);
          setLiffStatus('LIFF SDK を読み込めませんでした。', 'error');
          return;
        }

        debug.push('liff.init 開始');
        await liff.init({ liffId: LIFF_ID });
        debug.push('liff.init 成功');

        debug.push('liff.isInClient(): ' + liff.isInClient());
        debug.push('liff.isLoggedIn(): ' + liff.isLoggedIn());
        debug.push('liff.getOS(): ' + liff.getOS());
        debug.push('liff.getLanguage(): ' + liff.getLanguage());
        debug.push('liff.getVersion(): ' + liff.getVersion());

        if (!liff.isLoggedIn()) {
          debug.push('未ログインのため liff.login() 実行');
          setDebugInfo(debug);
          setLiffStatus('LINEログインへ進みます...', 'warn');
          liff.login();
          return;
        }

        /* --- getProfile を試みる --- */
        debug.push('getProfile 開始');
        var profile = await liff.getProfile();
        debug.push('getProfile 成功');

        var lineUserId = profile && profile.userId ? profile.userId : '';
        debug.push('displayName: ' + (profile && profile.displayName ? profile.displayName : ''));
        debug.push('userId: ' + (lineUserId || '(empty)'));

        if (!lineUserId) {
          setDebugInfo(debug);
          setLiffStatus('LINE userID を取得できませんでした。', 'error');
          return;
        }

        /* --- 成功: フラグクリア＆保存 --- */
        clearRetryFlag();

        localStorage.setItem('lineUserId', lineUserId);
        debug.push('localStorage lineUserId 保存完了');

        setDebugInfo(debug);
        setLiffStatus('LINE連携済みです。申込に進めます。', 'ok');
        setLinksEnabled(true);

      } catch (error) {
        debug.push('catch に入りました');
        debug.push('error.name: ' + (error && error.name ? error.name : ''));
        debug.push('error.message: ' + (error && error.message ? error.message : ''));
        debug.push('error.code: ' + (error && error.code ? error.code : ''));

        console.error('LIFF init error:', error);

        /* --- トークン期限切れ: 1回だけ再ログイン --- */
        if (isTokenError(error)) {
          if (hasAlreadyRetried()) {
            /* すでに1回再ログイン済み → ループせず停止 */
            debug.push('再ログイン済みだがまだ失敗。ループ防止で停止します。');
            clearRetryFlag();
            setDebugInfo(debug);
            setLiffStatus('LINE連携に失敗しました。LINEアプリを再起動して再度お試しください。', 'error');
            setLinksEnabled(false);
            return;
          }

          /* 1回目 → logout して login を試みる */
          debug.push('トークン期限切れを検知 → 1回だけ再ログインします');
          markRetried();
          setDebugInfo(debug);
          setLiffStatus('セッションを更新しています...', 'warn');

          try { liff.logout(); }
          catch (logoutErr) {
            debug.push('logout error: ' + (logoutErr.message || ''));
          }

          liff.login();
          return;
        }

        /* --- その他のエラー --- */
        setDebugInfo(debug);
        setLiffStatus('LINE連携に失敗しました: ' + (error && error.message ? error.message : 'unknown error'), 'error');
        setLinksEnabled(false);
      }
    }

    window.addEventListener('load', initLiffEntry);
  </script>
</body>
</html>
