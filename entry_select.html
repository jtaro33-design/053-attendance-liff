<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>053 申込メニュー</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      background: #f7f9fc;
      color: #1f2937;
      line-height: 1.6;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    .hero, .status-card, .menu-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      margin-bottom: 16px;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 10px;
      text-align: center;
    }

    .sub {
      font-size: 15px;
      color: #4b5563;
      text-align: center;
    }

    .status-title {
      font-size: 14px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 8px;
    }

    .status-text {
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .ok { color: #065f46; font-weight: 700; }
    .warn { color: #92400e; font-weight: 700; }
    .error { color: #b91c1c; font-weight: 700; }

    .menu-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .menu-text {
      font-size: 15px;
      color: #4b5563;
      margin-bottom: 16px;
    }

    a.button,
    button.button {
      display: block;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      padding: 14px;
      border-radius: 12px;
      background: #2563eb;
      color: #ffffff;
      border: none;
      cursor: pointer;
    }

    .button.secondary { background: #0f766e; }
    .button.gray { background: #e5e7eb; color: #111827; }
    .button:disabled { background: #94a3b8; color: #ffffff; cursor: not-allowed; }

    .note {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>053 申込メニュー</h1>
      <div class="sub">ご希望の申込項目を選択してください</div>
    </div>

    <div class="status-card">
      <div class="status-title">LINE連携状態</div>
      <div id="liffStatus" class="status-text">確認中です...</div>
    </div>

    <div class="menu-card">
      <div class="menu-title">通常練習</div>
      <div class="menu-text">
        通常練習への参加申込はこちらです。<br>
        日程を選んで、そのまま申込できます。
      </div>
      <a id="practiceLink" class="button" href="./index.html">通常練習へ進む</a>
    </div>

    <div class="menu-card">
      <div class="menu-title">クリニック / イベント</div>
      <div class="menu-text">
        クリニックや特別イベントの一覧はこちらです。<br>
        公開中のイベントのみ表示されます。
      </div>
      <a id="eventLink" class="button secondary" href="./event_list.html">イベント一覧へ進む</a>
    </div>

    <div class="menu-card">
      <div class="menu-title">会員申込</div>
      <div class="menu-text">
        スクール・クラブをご希望の方はこちらからお申し込みください。
      </div>
      <a id="memberLink" class="button gray" href="./member_application.html">会員申込へ進む</a>
    </div>

    <div class="note">
      LINE内で開くと、会員識別や申込済み判定が安定します
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const LIFF_ID = '2009553339-B6WeOFlT';

    function setLiffStatus(message, className = '') {
      const el = document.getElementById('liffStatus');
      el.textContent = message;
      el.className = `status-text ${className}`.trim();
    }

    function setLinksEnabled(enabled) {
      const ids = ['practiceLink', 'eventLink', 'memberLink'];
      ids.forEach((id) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.style.pointerEvents = enabled ? 'auto' : 'none';
        el.style.opacity = enabled ? '1' : '0.6';
      });
    }

    async function initLiffEntry() {
      try {
        setLinksEnabled(false);
        setLiffStatus('LINE連携を初期化しています...', 'warn');

        if (!window.liff) {
          setLiffStatus('LIFF SDK を読み込めませんでした。LINE内で開いてください。', 'error');
          return;
        }

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          setLiffStatus('LINEログインへ進みます...', 'warn');
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        const lineUserId = profile && profile.userId ? profile.userId : '';

        if (!lineUserId) {
          setLiffStatus('LINE userID を取得できませんでした。再度開き直してください。', 'error');
          return;
        }

        localStorage.setItem('lineUserId', lineUserId);
        setLiffStatus('LINE連携済みです。申込に進めます。', 'ok');
        setLinksEnabled(true);
      } catch (error) {
        console.error('LIFF init error:', error);
        setLiffStatus(`LINE連携に失敗しました: ${error?.message || 'unknown error'}`, 'error');
        setLinksEnabled(false);
      }
    }

    window.addEventListener('load', initLiffEntry);
  </script>
</body>
</html>
