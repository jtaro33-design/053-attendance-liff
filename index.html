<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通常練習 出席申込</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
      font-size: 18px;
      background: #f7f9fc;
      color: #1f2937;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 24px;
      margin: 0 0 8px;
      text-align: center;
    }

    .sub {
      font-size: 15px;
      color: #4b5563;
      margin-bottom: 20px;
      text-align: center;
    }

    .back-to-menu {
      display: block;
      text-align: center;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 10px;
      background: #f1f5f9;
      color: #475569;
      border: 1px solid #e2e8f0;
      margin-bottom: 18px;
    }

    .viewer-box {
      margin: 0 0 18px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #374151;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin: 20px 0 10px;
    }

    .practice-option {
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      background: #ffffff;
    }

    .practice-option.disabled {
      background: #e5e7eb;
      color: #6b7280;
      border-color: #d1d5db;
    }

    .practice-option label {
      display: flex;
      align-items: flex-start;
      cursor: pointer;
      gap: 10px;
    }

    .practice-option input[type="checkbox"] {
      transform: scale(1.3);
      margin-top: 4px;
      flex-shrink: 0;
    }

    .practice-meta {
      font-size: 16px;
    }

    .badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 13px;
      background: #d1d5db;
      color: #374151;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .field input,
    .field textarea {
      width: 100%;
      box-sizing: border-box;
      font-size: 18px;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
    }

    .field textarea {
      min-height: 100px;
      resize: vertical;
    }

    .notice {
      margin: 20px 0;
      padding: 14px;
      background: #eff6ff;
      border-radius: 12px;
      font-size: 15px;
      color: #1e3a8a;
    }

    .comment-note {
      margin-top: 0;
      margin-bottom: 16px;
      background: #f8fafc;
      color: #374151;
      border: 1px solid #e2e8f0;
    }

    button {
      width: 100%;
      font-size: 18px;
      font-weight: 700;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #ffffff;
      cursor: pointer;
      margin-top: 10px;
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .secondary-button {
      background: #e5e7eb;
      color: #111827;
      max-width: 360px;
      margin: 18px auto 0;
      display: block;
    }

    .status {
      margin-top: 16px;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .hidden {
      display: none;
    }

    .success-box {
      text-align: center;
      padding: 28px 16px;
    }

    .success-title {
      font-size: 24px;
      line-height: 1.5;
      font-weight: 800;
      color: #065f46;
      margin-bottom: 16px;
    }

    .success-text {
      font-size: 18px;
      color: #374151;
      line-height: 1.9;
      margin: 0 auto;
      max-width: 420px;
    }

    .success-title-line,
    .success-text-line {
      display: block;
    }

    .calendar-wrapper {
      margin-bottom: 18px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      background: #ffffff;
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #f1f5f9;
      border-bottom: 1px solid #e2e8f0;
    }

    .calendar-header-title {
      font-size: 16px;
      font-weight: 700;
      color: #1f2937;
    }

    .calendar-nav-btn {
      width: auto;
      background: none;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 14px;
      font-weight: 700;
      color: #475569;
      cursor: pointer;
      margin: 0;
    }

    .calendar-nav-btn:disabled {
      background: none;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .calendar-dow {
      font-size: 13px;
      font-weight: 700;
      padding: 8px 0 4px;
      color: #6b7280;
      background: #f8fafc;
    }

    .calendar-dow:first-child {
      color: #dc2626;
    }

    .calendar-dow:last-child {
      color: #2563eb;
    }

    .calendar-cell {
      padding: 6px 2px;
      font-size: 14px;
      cursor: default;
      position: relative;
      min-height: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .calendar-cell.empty {
      background: transparent;
    }

    .calendar-cell.has-schedule {
      cursor: pointer;
      font-weight: 700;
    }

    .calendar-cell.has-schedule:hover {
      background: #eff6ff;
    }

    .calendar-cell.today .cal-day-num {
      background: #dbeafe;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      line-height: 28px;
      display: inline-block;
    }

    .calendar-cell.selected {
      background: #2563eb;
      color: #ffffff;
    }

    .calendar-cell.selected .cal-day-num {
      background: transparent;
      color: #ffffff;
    }

    .calendar-cell.selected .cal-dot-practice,
    .calendar-cell.selected .cal-dot-event {
      opacity: 0.9;
    }

    .cal-dots {
      display: flex;
      gap: 3px;
      margin-top: 2px;
      justify-content: center;
    }

    .cal-dot-practice {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2563eb;
    }

    .cal-dot-event {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f59e0b;
    }

    .calendar-legend {
      display: flex;
      gap: 14px;
      justify-content: center;
      padding: 6px 12px 8px;
      font-size: 12px;
      color: #6b7280;
      border-top: 1px solid #f1f5f9;
    }

    .calendar-legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .legend-dot-practice {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2563eb;
    }

    .legend-dot-event {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f59e0b;
    }

    .calendar-filter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #eff6ff;
      border-top: 1px solid #e2e8f0;
      font-size: 14px;
      color: #1e3a8a;
    }

    .calendar-clear-btn {
      width: auto;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      cursor: pointer;
      margin: 0;
    }

    .calendar-clear-btn:disabled {
      background: #ffffff;
    }

    .no-practice-msg {
      padding: 14px;
      text-align: center;
      font-size: 15px;
      color: #6b7280;
      border: 1px dashed #d1d5db;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .event-item {
      border: 1px solid #fcd34d;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fffbeb;
    }

    .event-item-inner {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .event-type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #f59e0b;
      color: #ffffff;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .event-meta {
      font-size: 15px;
      line-height: 1.7;
    }

    .event-title {
      font-size: 16px;
      font-weight: 700;
      color: #1f2937;
    }

    .event-detail-line {
      font-size: 14px;
      color: #4b5563;
    }

    .event-sub {
      margin-top: 4px;
      font-size: 13px;
      color: #6b7280;
    }

    .event-link {
      display: inline-block;
      margin-top: 6px;
      font-size: 13px;
      color: #2563eb;
      text-decoration: none;
    }

    .event-link:hover {
      text-decoration: underline;
    }

    .fee-label {
      display: inline-block;
      margin-top: 6px;
      padding: 3px 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .fee-label.fee-unknown {
      background: #f9fafb;
      color: #6b7280;
      border-color: #e5e7eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="formView">
      <a href="./entry_select.html" class="back-to-menu">← メインメニューへ戻る</a>

      <h1>通常練習 出席申込</h1>
      <div class="sub">参加する練習を選んでお申し込みください</div>

      <div id="viewerBox" class="viewer-box">会員情報を確認中です...</div>

      <div id="calendarWrapper" class="calendar-wrapper hidden">
        <div class="calendar-header">
          <button type="button" class="calendar-nav-btn" onclick="changeCalendarMonth(-1)">◀ 前月</button>
          <span id="calendarTitle" class="calendar-header-title"></span>
          <button type="button" class="calendar-nav-btn" onclick="changeCalendarMonth(1)">次月 ▶</button>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
        <div class="calendar-legend">
          <span class="calendar-legend-item"><span class="legend-dot-practice"></span> 通常練習</span>
          <span class="calendar-legend-item"><span class="legend-dot-event"></span> イベント / クリニック</span>
        </div>
        <div id="calendarFilterBar" class="calendar-filter-bar hidden">
          <span id="calendarFilterLabel"></span>
          <button type="button" class="calendar-clear-btn" onclick="clearCalendarDateFilter()">全日程表示</button>
        </div>
      </div>

      <div class="section-title">対象練習</div>
      <div id="practiceList"></div>

      <div id="eventListSection" class="hidden">
        <div class="section-title">イベント / クリニック</div>
        <div id="eventList"></div>
      </div>

      <div class="field">
        <label for="childName">子ども氏名</label>
        <input id="childName" type="text" placeholder="例）山田 太郎">
      </div>

      <div class="field">
        <label for="parentName">保護者氏名</label>
        <input id="parentName" type="text" placeholder="例）山田 花子">
      </div>

      <div class="notice comment-note">
        キャンセル・変更がある場合は、コメントでお知らせください。
      </div>

      <div class="field">
        <label for="note">備考（任意）</label>
        <textarea id="note" placeholder="遅れて参加、見学あり など"></textarea>
      </div>

      <div class="notice">
        ・複数の日程をまとめて申し込みできます<br>
        ・事前申込は前日23:59までです<br>
        ・当日申込も可能です<br>
        ・練習内容構成のため、できるだけ事前申込にご協力ください
      </div>

      <button id="submitBtn" onclick="submitAttendance()">この内容で申し込む</button>
      <div id="status" class="status"></div>
    </div>

    <div id="successView" class="hidden">
      <div class="success-box">
        <div class="success-title">
          <span class="success-title-line">お申し込み</span>
          <span class="success-title-line">ありがとうございます！</span>
        </div>
        <div id="successText" class="success-text"></div>
        <button class="secondary-button" onclick="resetFormView()">戻る</button>
        <a href="./entry_select.html" class="secondary-button" style="text-decoration:none; text-align:center;">メインメニューへ戻る</a>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyg0g1BMLA8HIVB13iyN4IbEcG7rOKG8m5NzUNl7a9U_ovSGno5c7pd1Vd7Woqo8brf/exec';
    const LINE_USER_ID = localStorage.getItem('lineUserId') || '';

    let practices = [];
    let activeSignupPracticeIds = [];
    let viewerProfile = {
      found: false,
      childName: '',
      parentName: '',
      category: '一般'
    };

    let events = [];
    let currentCalendarMonth = null;
    let selectedPracticeDate = '';

    function normalizeId(id) {
      return String(id || '').replace(/-/g, '').trim();
    }

    function setStatus(message) {
      document.getElementById('status').textContent = message;
    }

    function setViewerBox() {
      const viewerBox = document.getElementById('viewerBox');

      if (viewerProfile.found) {
        viewerBox.textContent =
          '会員情報を読み込みました\n' +
          '区分: ' + (viewerProfile.category || '一般') + '\n' +
          '子ども氏名: ' + (viewerProfile.childName || '(空)') + '\n' +
          '保護者氏名: ' + (viewerProfile.parentName || '(空)');
      } else if (LINE_USER_ID) {
        viewerBox.textContent =
          'LINE連携済みです。\n' +
          '会員情報が未登録の場合は手入力してください。';
      } else {
        viewerBox.textContent =
          'LINE userID が未取得です。\n' +
          'この状態だと通常練習申込は通りません。';
      }
    }

    function formatDateShort(dateString) {
      if (!dateString) return '';
      const d = new Date(dateString + 'T00:00:00');
      if (isNaN(d.getTime())) return dateString;

      return new Intl.DateTimeFormat('ja-JP', {
        timeZone: 'Asia/Tokyo',
        month: 'numeric',
        day: 'numeric',
        weekday: 'short'
      }).format(d);
    }

    function buildPracticeLabel(practice) {
      const parts = [];
      const dateLabel = formatDateShort(practice.date);
      if (dateLabel) parts.push(dateLabel);
      if (practice.startTime || practice.endTime) {
        parts.push((practice.startTime || '') + (practice.startTime && practice.endTime ? '〜' : '') + (practice.endTime || ''));
      }
      if (practice.place) parts.push(practice.place);
      if (practice.title) parts.push(practice.title);
      return parts.join('｜');
    }

    function loadSavedInputs() {
      document.getElementById('childName').value = localStorage.getItem('attendance_childName') || '';
      document.getElementById('parentName').value = localStorage.getItem('attendance_parentName') || '';
      document.getElementById('note').value = localStorage.getItem('attendance_note') || '';
    }

    function saveInputs() {
      localStorage.setItem('attendance_childName', document.getElementById('childName').value.trim());
      localStorage.setItem('attendance_parentName', document.getElementById('parentName').value.trim());
      localStorage.setItem('attendance_note', document.getElementById('note').value.trim());
    }

    function applyViewerProfileToInputs() {
      const childInput = document.getElementById('childName');
      const parentInput = document.getElementById('parentName');

      if (viewerProfile.childName) {
        childInput.value = viewerProfile.childName;
      }
      if (viewerProfile.parentName) {
        parentInput.value = viewerProfile.parentName;
      }
    }

    function findFeeValue(obj, candidateKeys) {
      for (var i = 0; i < candidateKeys.length; i++) {
        var key = candidateKeys[i];
        if (Object.prototype.hasOwnProperty.call(obj, key)) {
          var val = obj[key];
          if (val !== undefined && val !== null && val !== '') {
            return val;
          }
        }
      }
      return undefined;
    }

    function formatFeeValue(fee) {
      if (fee === undefined || fee === null || fee === '') return null;
      if (fee === 0 || fee === '0' || fee === '無料' || fee === 'free') return '無料';
      var num = Number(fee);
      if (!isNaN(num)) return num.toLocaleString() + '円';
      return String(fee);
    }

    function getPracticeFeeLabel(practice) {
      var cat = viewerProfile.category || '一般';

      if (cat === 'クラブ') {
        return '無料';
      }

      var fee;
      if (cat === 'スクール') {
        fee = findFeeValue(practice, [
          '参加費スクール生',
          '参加費スクール',
          'feeSchool',
          'schoolPrice',
          'スクール料金',
          'スクール生料金'
        ]);
      } else {
        fee = findFeeValue(practice, [
          '参加費一般',
          'feeGeneral',
          'generalPrice',
          '一般料金',
          '参加費'
        ]);
      }

      var formatted = formatFeeValue(fee);
      return formatted !== null ? formatted : '料金未設定';
    }

    function getEventFeeLabel(ev) {
      var cat = viewerProfile.category || '一般';
      var src = ev.raw || ev;

      var fee;
      if (cat === 'クラブ') {
        fee = findFeeValue(src, [
          '参加費クラブ',
          '参加費クラブ生',
          'clubPrice',
          'feeClub',
          'クラブ料金',
          'クラブ生料金'
        ]);
        if (fee === undefined || fee === null || fee === '') {
          fee = findFeeValue(src, ['参加費', 'fee']);
        }
      } else if (cat === 'スクール') {
        fee = findFeeValue(src, [
          '参加費スクール生',
          '参加費スクール',
          'schoolPrice',
          'feeSchool',
          'スクール料金',
          'スクール生料金'
        ]);
      } else {
        fee = findFeeValue(src, [
          '参加費一般',
          'generalPrice',
          'feeGeneral',
          '一般料金',
          '参加費',
          'fee'
        ]);
      }

      var formatted = formatFeeValue(fee);
      return formatted !== null ? formatted : '料金未設定';
    }

    function buildFeeHtml(feeText) {
      var cssClass = (feeText === '料金未設定') ? 'fee-label fee-unknown' : 'fee-label';
      return '<div class="' + cssClass + '">あなたの参加費: ' + feeText + '</div>';
    }

    async function fetchJsonWithTimeout(url, timeoutMs) {
      const controller = new AbortController();
      const timerId = setTimeout(function() {
        controller.abort();
      }, timeoutMs);

      try {
        const response = await fetch(url, {
          method: 'GET',
          signal: controller.signal,
          cache: 'no-store'
        });
        return await response.json();
      } finally {
        clearTimeout(timerId);
      }
    }

    async function loadViewerProfile() {
      if (!LINE_USER_ID) {
        viewerProfile = {
          found: false,
          childName: '',
          parentName: '',
          category: '一般'
        };
        setViewerBox();
        return;
      }

      try {
        const result = await fetchJsonWithTimeout(
          WEB_APP_URL + '?mode=viewerProfile&lineUserId=' + encodeURIComponent(LINE_USER_ID) + '&t=' + Date.now(),
          8000
        );

        if (result.ok) {
          viewerProfile = {
            found: !!result.found,
            childName: result.childName || '',
            parentName: result.parentName || '',
            category: result.category || '一般'
          };
        } else {
          viewerProfile = {
            found: false,
            childName: '',
            parentName: '',
            category: '一般'
          };
        }
      } catch (error) {
        viewerProfile = {
          found: false,
          childName: '',
          parentName: '',
          category: '一般'
        };
      }

      setViewerBox();
    }

    async function loadPractices() {
      try {
        const result = await fetchJsonWithTimeout(
          WEB_APP_URL + '?mode=publicPractices&t=' + Date.now(),
          10000
        );

        if (result.ok && Array.isArray(result.items)) {
          practices = result.items.filter(function(item) {
            return item.title === '通常練習';
          });
        } else {
          practices = [];
        }
      } catch (error) {
        practices = [];
      }
    }

    async function loadEvents() {
      try {
        const result = await fetchJsonWithTimeout(
          WEB_APP_URL + '?mode=publicEvents&t=' + Date.now(),
          10000
        );

        if (result.ok && Array.isArray(result.items)) {
          events = result.items.map(function(item) {
            return {
              id: item.pageId || item.id || '',
              date: item.eventDate || item.date || '',
              title: item.eventName || item.title || '',
              startTime: item.startTime || '',
              endTime: item.endTime || '',
              place: item.place || '',
              note: item.note || '',
              formUrl: item.formUrl || item.url || '',
              statusLabel: item.statusLabel || '',
              targetLabel: item.targetLabel || '',
              raw: item
            };
          }).filter(function(item) {
            return !!item.date;
          });
        } else {
          events = [];
        }
      } catch (error) {
        events = [];
      }
    }

    async function loadActiveSignupPracticeIds() {
      if (!LINE_USER_ID) {
        activeSignupPracticeIds = [];
        return;
      }

      try {
        const result = await fetchJsonWithTimeout(
          WEB_APP_URL + '?mode=activeSignupPracticeIds&lineUserId=' + encodeURIComponent(LINE_USER_ID) + '&t=' + Date.now(),
          8000
        );

        if (result.ok && Array.isArray(result.practiceIds)) {
          activeSignupPracticeIds = result.practiceIds.map(function(id) {
            return normalizeId(id);
          });
        } else {
          activeSignupPracticeIds = [];
        }
      } catch (error) {
        activeSignupPracticeIds = [];
      }
    }

    function renderPracticeList() {
      let displayPractices = practices;
      if (selectedPracticeDate) {
        displayPractices = practices.filter(function(p) {
          return p.date === selectedPracticeDate;
        });
      }

      const container = document.getElementById('practiceList');
      container.innerHTML = '';

      if (!Array.isArray(displayPractices) || displayPractices.length === 0) {
        if (selectedPracticeDate) {
          container.innerHTML = '<div class="no-practice-msg">この日に公開中の通常練習はありません</div>';
        } else {
          container.innerHTML = '<div class="practice-option disabled">現在、公開中の通常練習はありません。</div>';
        }
        return;
      }

      displayPractices.forEach(function(practice) {
        const normalizedPracticeId = normalizeId(practice.id);
        const isDisabled = activeSignupPracticeIds.includes(normalizedPracticeId);
        const wrapper = document.createElement('div');
        wrapper.className = 'practice-option' + (isDisabled ? ' disabled' : '');

        const displayLabel = buildPracticeLabel(practice);
        const feeHtml = buildFeeHtml(getPracticeFeeLabel(practice));

        wrapper.innerHTML = `
          <label>
            <input
              type="checkbox"
              name="practice"
              value="${normalizedPracticeId}"
              data-date="${practice.date || ''}"
              data-label="${displayLabel}"
              ${isDisabled ? 'disabled' : ''}
            >
            <div class="practice-meta">
              <div>${displayLabel}</div>
              ${feeHtml}
              ${isDisabled ? '<div class="badge">申込済み</div>' : ''}
            </div>
          </label>
        `;

        container.appendChild(wrapper);
      });
    }

    function renderEventList() {
      let displayEvents = events;
      if (selectedPracticeDate) {
        displayEvents = events.filter(function(ev) {
          return ev.date === selectedPracticeDate;
        });
      }

      const section = document.getElementById('eventListSection');
      const container = document.getElementById('eventList');
      container.innerHTML = '';

      if (!Array.isArray(events) || events.length === 0) {
        section.classList.add('hidden');
        return;
      }

      if (!Array.isArray(displayEvents) || displayEvents.length === 0) {
        section.classList.remove('hidden');
        if (selectedPracticeDate) {
          container.innerHTML = '<div class="no-practice-msg">この日に公開中のイベント / クリニックはありません</div>';
        } else {
          container.innerHTML = '';
        }
        return;
      }

      section.classList.remove('hidden');

      displayEvents.forEach(function(ev) {
        var wrapper = document.createElement('div');
        wrapper.className = 'event-item';

        var titleHtml = '<div class="event-title">' + (ev.title || '(タイトルなし)') + '</div>';

        var detailLines = [];

        if (ev.targetLabel) {
          detailLines.push('<div class="event-detail-line">対象: ' + ev.targetLabel + '</div>');
        }

        var timeStr = '';
        if (ev.startTime || ev.endTime) {
          timeStr = (ev.startTime || '') + (ev.startTime && ev.endTime ? ' 〜 ' : '') + (ev.endTime || '');
        }
        var dateStr = formatDateShort(ev.date);
        if (dateStr || timeStr) {
          var dateTimeParts = [];
          if (dateStr) dateTimeParts.push(dateStr);
          if (timeStr) dateTimeParts.push(timeStr);
          detailLines.push('<div class="event-detail-line">' + dateTimeParts.join('  ') + '</div>');
        }

        if (ev.place) {
          detailLines.push('<div class="event-detail-line">' + ev.place + '</div>');
        }

        var feeHtml = buildFeeHtml(getEventFeeLabel(ev));

        var subParts = [];
        if (ev.statusLabel) subParts.push(ev.statusLabel);
        var subHtml = subParts.length
          ? '<div class="event-sub">' + subParts.join('') + '</div>'
          : '';

        var linkHtml = ev.formUrl
          ? '<a href="' + ev.formUrl + '" class="event-link" target="_blank" rel="noopener noreferrer">詳細・申込はこちら →</a>'
          : '';

        wrapper.innerHTML =
          '<div class="event-item-inner">' +
            '<span class="event-type-badge">イベント</span>' +
            '<div class="event-meta">' +
              titleHtml +
              detailLines.join('') +
              feeHtml +
              subHtml +
              linkHtml +
            '</div>' +
          '</div>';

        container.appendChild(wrapper);
      });
    }

    function getSelectedPractices() {
      const selected = document.querySelectorAll('input[name="practice"]:checked');
      return Array.from(selected).map(function(item) {
        return {
          practiceId: normalizeId(item.value),
          practiceDate: item.dataset.date,
          practiceLabel: item.dataset.label
        };
      });
    }

    function postOnePractice(payload) {
      return new Promise(function(resolve) {
        const iframeName = 'hiddenSubmitFrame_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
        const iframe = document.createElement('iframe');
        iframe.name = iframeName;
        iframe.style.display = 'none';
        document.body.appendChild(iframe);

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = WEB_APP_URL;
        form.target = iframeName;
        form.style.display = 'none';

        Object.keys(payload).forEach(function(key) {
          const input = document.createElement('input');
          input.type = 'hidden';
          input.name = key;
          input.value = payload[key];
          form.appendChild(input);
        });

        document.body.appendChild(form);
        form.submit();

        setTimeout(function() {
          form.remove();
          iframe.remove();
          resolve(true);
        }, 1200);
      });
    }

    async function submitAttendance() {
      const submitBtn = document.getElementById('submitBtn');
      const childName = document.getElementById('childName').value.trim();
      const parentName = document.getElementById('parentName').value.trim();
      const note = document.getElementById('note').value.trim();
      const selectedPractices = getSelectedPractices();

      if (!LINE_USER_ID) {
        setStatus('LINE userID が取得できていません。entry_select.html から入り直してください。');
        return;
      }

      if (selectedPractices.length === 0) {
        setStatus('対象練習を1つ以上選択してください');
        return;
      }

      if (!childName) {
        setStatus('子ども氏名を入力してください');
        return;
      }

      if (!parentName) {
        setStatus('保護者氏名を入力してください');
        return;
      }

      saveInputs();
      submitBtn.disabled = true;
      setStatus('送信中です...（' + selectedPractices.length + '件）');

      try {
        for (const practice of selectedPractices) {
          const payload = {
            lineUserId: LINE_USER_ID,
            practiceId: normalizeId(practice.practiceId),
            practiceDate: practice.practiceDate,
            practiceLabel: practice.practiceLabel,
            childName: childName,
            parentName: parentName,
            note: note,
            submittedAt: new Date().toISOString()
          };

          await postOnePractice(payload);
        }

        await loadActiveSignupPracticeIds();
        renderPracticeList();

        document.getElementById('formView').classList.add('hidden');
        document.getElementById('successView').classList.remove('hidden');
        document.getElementById('successText').innerHTML =
          '<span class="success-text-line">' + selectedPractices.length + '件のお申し込みを受け付けました。</span>' +
          '<span class="success-text-line">当日お気をつけてお越し下さい。</span>';
        setStatus('');
      } catch (error) {
        setStatus('送信エラー: ' + error.message);
        submitBtn.disabled = false;
      }
    }

    function getScheduleDateSets() {
      const practiceDateSet = {};
      const eventDateSet = {};

      practices.forEach(function(p) {
        if (p.date) practiceDateSet[p.date] = true;
      });

      events.forEach(function(ev) {
        if (ev.date) eventDateSet[ev.date] = true;
      });

      return {
        practices: practiceDateSet,
        events: eventDateSet
      };
    }

    function toDateStr(year, month, day) {
      return year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
    }

    function getTodayStr() {
      const now = new Date();
      return toDateStr(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function renderCalendar() {
      if (!currentCalendarMonth) {
        const now = new Date();
        currentCalendarMonth = new Date(now.getFullYear(), now.getMonth(), 1);
      }

      const year = currentCalendarMonth.getFullYear();
      const month = currentCalendarMonth.getMonth();

      document.getElementById('calendarTitle').textContent = year + '年 ' + (month + 1) + '月';

      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      const dows = ['日', '月', '火', '水', '木', '金', '土'];
      dows.forEach(function(d) {
        const cell = document.createElement('div');
        cell.className = 'calendar-dow';
        cell.textContent = d;
        grid.appendChild(cell);
      });

      const firstDow = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const dateSets = getScheduleDateSets();
      const todayStr = getTodayStr();

      for (let i = 0; i < firstDow; i++) {
        const empty = document.createElement('div');
        empty.className = 'calendar-cell empty';
        grid.appendChild(empty);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = toDateStr(year, month, day);
        const cell = document.createElement('div');
        const classes = ['calendar-cell'];

        const hasPractice = !!dateSets.practices[dateStr];
        const hasEvent = !!dateSets.events[dateStr];
        const hasAny = hasPractice || hasEvent;

        if (hasAny) classes.push('has-schedule');
        if (dateStr === todayStr) classes.push('today');
        if (dateStr === selectedPracticeDate) classes.push('selected');

        cell.className = classes.join(' ');

        const numSpan = document.createElement('span');
        numSpan.className = 'cal-day-num';
        numSpan.textContent = day;
        cell.appendChild(numSpan);

        if (hasAny) {
          const dotsContainer = document.createElement('span');
          dotsContainer.className = 'cal-dots';

          if (hasPractice) {
            const dotP = document.createElement('span');
            dotP.className = 'cal-dot-practice';
            dotsContainer.appendChild(dotP);
          }

          if (hasEvent) {
            const dotE = document.createElement('span');
            dotE.className = 'cal-dot-event';
            dotsContainer.appendChild(dotE);
          }

          cell.appendChild(dotsContainer);
          cell.setAttribute('data-date', dateStr);
          cell.addEventListener('click', function() {
            selectCalendarDate(this.getAttribute('data-date'));
          });
        }

        grid.appendChild(cell);
      }

      document.getElementById('calendarWrapper').classList.remove('hidden');
    }

    function changeCalendarMonth(offset) {
      if (!currentCalendarMonth) {
        const now = new Date();
        currentCalendarMonth = new Date(now.getFullYear(), now.getMonth(), 1);
      }

      currentCalendarMonth = new Date(
        currentCalendarMonth.getFullYear(),
        currentCalendarMonth.getMonth() + offset,
        1
      );

      renderCalendar();
    }

    function selectCalendarDate(dateStr) {
      if (selectedPracticeDate === dateStr) {
        clearCalendarDateFilter();
        return;
      }

      selectedPracticeDate = dateStr;
      renderCalendar();
      renderPracticeList();
      renderEventList();

      const filterBar = document.getElementById('calendarFilterBar');
      const filterLabel = document.getElementById('calendarFilterLabel');
      filterBar.classList.remove('hidden');
      filterLabel.textContent = formatDateShort(dateStr) + ' のスケジュールを表示中';
    }

    function clearCalendarDateFilter() {
      selectedPracticeDate = '';
      renderCalendar();
      renderPracticeList();
      renderEventList();
      document.getElementById('calendarFilterBar').classList.add('hidden');
    }

    async function initPage() {
      loadSavedInputs();

      setStatus('会員情報を読み込み中です...');
      await loadViewerProfile();
      applyViewerProfileToInputs();

      setStatus('練習・イベント情報を読み込み中です...');
      await Promise.all([
        loadPractices(),
        loadEvents()
      ]);

      renderPracticeList();
      renderEventList();
      renderCalendar();
      setStatus('');

      loadActiveSignupPracticeIds().then(function() {
        renderPracticeList();
      });
    }

    async function resetFormView() {
      document.getElementById('successView').classList.add('hidden');
      document.getElementById('formView').classList.remove('hidden');
      document.getElementById('submitBtn').disabled = false;
      selectedPracticeDate = '';
      document.getElementById('calendarFilterBar').classList.add('hidden');
      await initPage();
    }

    window.addEventListener('load', function() {
      initPage();
    });
  </script>
</body>
</html>
