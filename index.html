<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通常練習 出席申込</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
      font-size: 18px;
      background: #f7f9fc;
      color: #1f2937;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 24px;
      margin: 0 0 8px;
      text-align: center;
    }

    .sub {
      font-size: 15px;
      color: #4b5563;
      margin-bottom: 20px;
      text-align: center;
    }

    .viewer-box {
      margin: 0 0 18px;
      padding: 12px 14px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 14px;
      color: #374151;
      text-align: center;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin: 20px 0 10px;
    }

    .practice-option {
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      background: #ffffff;
    }

    .practice-option.disabled {
      background: #e5e7eb;
      color: #6b7280;
      border-color: #d1d5db;
    }

    .practice-option label {
      display: flex;
      align-items: flex-start;
      cursor: pointer;
      gap: 10px;
    }

    .practice-option input[type="checkbox"] {
      transform: scale(1.3);
      margin-top: 4px;
      flex-shrink: 0;
    }

    .practice-meta {
      font-size: 16px;
    }

    .badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 13px;
      background: #d1d5db;
      color: #374151;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .field input,
    .field textarea {
      width: 100%;
      box-sizing: border-box;
      font-size: 18px;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
    }

    .field textarea {
      min-height: 100px;
      resize: vertical;
    }

    .notice {
      margin: 20px 0;
      padding: 14px;
      background: #eff6ff;
      border-radius: 12px;
      font-size: 15px;
      color: #1e3a8a;
    }

    .comment-note {
      margin-top: 0;
      margin-bottom: 16px;
      background: #f8fafc;
      color: #374151;
      border: 1px solid #e2e8f0;
    }

    button {
      width: 100%;
      font-size: 18px;
      font-weight: 700;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #ffffff;
      cursor: pointer;
      margin-top: 10px;
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .secondary-button {
      background: #e5e7eb;
      color: #111827;
      max-width: 360px;
      margin: 18px auto 0;
      display: block;
    }

    .status {
      margin-top: 16px;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .hidden {
      display: none;
    }

    .success-box {
      text-align: center;
      padding: 28px 16px;
    }

    .success-title {
      font-size: 24px;
      line-height: 1.5;
      font-weight: 800;
      color: #065f46;
      margin-bottom: 16px;
    }

    .success-text {
      font-size: 18px;
      color: #374151;
      line-height: 1.9;
      margin: 0 auto;
      max-width: 420px;
    }

    .success-title-line,
    .success-text-line {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="formView">
      <h1>通常練習 出席申込</h1>
      <div class="sub">参加する練習を選んでお申し込みください</div>

      <div id="viewerBox" class="viewer-box">会員情報を確認中です...</div>

      <div class="section-title">対象練習</div>
      <div id="practiceList"></div>

      <div class="field">
        <label for="childName">子ども氏名</label>
        <input id="childName" type="text" placeholder="例）山田 太郎">
      </div>

      <div class="field">
        <label for="parentName">保護者氏名</label>
        <input id="parentName" type="text" placeholder="例）山田 花子">
      </div>

      <div class="notice comment-note">
        キャンセル・変更がある場合は、コメントでお知らせください。
      </div>

      <div class="field">
        <label for="note">備考（任意）</label>
        <textarea id="note" placeholder="遅れて参加、見学あり など"></textarea>
      </div>

      <div class="notice">
        ・複数の日程をまとめて申し込みできます<br>
        ・事前申込は前日23:59までです<br>
        ・当日申込も可能です<br>
        ・練習内容構成のため、できるだけ事前申込にご協力ください
      </div>

      <button id="submitBtn" onclick="submitAttendance()">この内容で申し込む</button>
      <div id="status" class="status"></div>
    </div>

    <div id="successView" class="hidden">
      <div class="success-box">
        <div class="success-title">
          <span class="success-title-line">お申し込み</span>
          <span class="success-title-line">ありがとうございます！</span>
        </div>
        <div id="successText" class="success-text"></div>
        <button class="secondary-button" onclick="resetFormView()">戻る</button>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyg0g1BMLA8HIVB13iyN4IbEcG7rOKG8m5NzUNl7a9U_ovSGno5c7pd1Vd7Woqo8brf/exec';
    const LINE_USER_ID = localStorage.getItem('lineUserId') || '';

    let practices = [];
    let activeSignupPracticeIds = [];
    let viewerProfile = {
      found: false,
      childName: '',
      parentName: '',
      category: '一般'
    };

    function setStatus(message) {
      document.getElementById('status').textContent = message;
    }

    function setViewerBox() {
      const viewerBox = document.getElementById('viewerBox');

      if (viewerProfile.found) {
        viewerBox.textContent = `会員情報を読み込みました（区分: ${viewerProfile.category}）`;
      } else if (LINE_USER_ID) {
        viewerBox.textContent = 'LINE連携済みです。会員情報が未登録の場合は手入力してください。';
      } else {
        viewerBox.textContent = 'LINE userID が未取得です。必要に応じて手入力してください。';
      }
    }

    function loadSavedNames() {
      const savedChildName = localStorage.getItem('attendance_childName') || '';
      const savedParentName = localStorage.getItem('attendance_parentName') || '';

      document.getElementById('childName').value = savedChildName;
      document.getElementById('parentName').value = savedParentName;
    }

    function applyViewerProfileToInputs() {
      const childInput = document.getElementById('childName');
      const parentInput = document.getElementById('parentName');

      if (viewerProfile.childName) {
        childInput.value = viewerProfile.childName;
      }
      if (viewerProfile.parentName) {
        parentInput.value = viewerProfile.parentName;
      }
    }

    function saveNames() {
      localStorage.setItem('attendance_childName', document.getElementById('childName').value.trim());
      localStorage.setItem('attendance_parentName', document.getElementById('parentName').value.trim());
    }

    async function loadViewerProfile() {
      try {
        const response = await fetch(
          `${WEB_APP_URL}?mode=viewerProfile&lineUserId=${encodeURIComponent(LINE_USER_ID)}`
        );
        const result = await response.json();

        if (result.ok) {
          viewerProfile = {
            found: !!result.found,
            childName: result.childName || '',
            parentName: result.parentName || '',
            category: result.category || '一般'
          };
        } else {
          viewerProfile = {
            found: false,
            childName: '',
            parentName: '',
            category: '一般'
          };
        }
      } catch (error) {
        console.error(error);
        viewerProfile = {
          found: false,
          childName: '',
          parentName: '',
          category: '一般'
        };
      }

      setViewerBox();
    }

    async function loadPractices() {
      try {
        const response = await fetch(`${WEB_APP_URL}?mode=publicPractices`);
        const result = await response.json();

        if (result.ok && Array.isArray(result.items)) {
          practices = result.items.filter((item) => item.title === '通常練習');
        } else {
          practices = [];
        }
      } catch (error) {
        console.error(error);
        practices = [];
      }
    }

    async function loadActiveSignupPracticeIds() {
      try {
        const url = `${WEB_APP_URL}?mode=activeSignupPracticeIds&lineUserId=${encodeURIComponent(LINE_USER_ID)}`;
        const response = await fetch(url);
        const result = await response.json();

        if (result.ok && Array.isArray(result.practiceIds)) {
          activeSignupPracticeIds = result.practiceIds;
        } else {
          activeSignupPracticeIds = [];
        }
      } catch (error) {
        console.error(error);
        activeSignupPracticeIds = [];
      }
    }

    function renderPracticeList() {
      const container = document.getElementById('practiceList');
      container.innerHTML = '';

      if (practices.length === 0) {
        container.innerHTML = '<div class="practice-option disabled">現在、公開中の通常練習はありません。</div>';
        return;
      }

      practices.forEach((practice) => {
        const isDisabled = activeSignupPracticeIds.includes(practice.id);
        const wrapper = document.createElement('div');
        wrapper.className = `practice-option ${isDisabled ? 'disabled' : ''}`;

        wrapper.innerHTML = `
          <label>
            <input
              type="checkbox"
              name="practice"
              value="${practice.id}"
              data-date="${practice.date}"
              data-label="${practice.label}"
              ${isDisabled ? 'disabled' : ''}
            >
            <div class="practice-meta">
              <div>${practice.label}</div>
              ${isDisabled ? '<div class="badge">申込済み</div>' : ''}
            </div>
          </label>
        `;

        container.appendChild(wrapper);
      });
    }

    function getSelectedPractices() {
      const selected = document.querySelectorAll('input[name="practice"]:checked');
      return Array.from(selected).map((item) => ({
        practiceId: item.value,
        practiceDate: item.dataset.date,
        practiceLabel: item.dataset.label
      }));
    }

    function postOnePractice(payload) {
      return new Promise((resolve) => {
        const iframeName = 'hiddenSubmitFrame_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
        const iframe = document.createElement('iframe');
        iframe.name = iframeName;
        iframe.style.display = 'none';
        document.body.appendChild(iframe);

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = WEB_APP_URL;
        form.target = iframeName;
        form.style.display = 'none';

        Object.keys(payload).forEach((key) => {
          const input = document.createElement('input');
          input.type = 'hidden';
          input.name = key;
          input.value = payload[key];
          form.appendChild(input);
        });

        document.body.appendChild(form);
        form.submit();

        setTimeout(() => {
          form.remove();
          iframe.remove();
          resolve(true);
        }, 800);
      });
    }

    async function submitAttendance() {
      const submitBtn = document.getElementById('submitBtn');
      const childName = document.getElementById('childName').value.trim();
      const parentName = document.getElementById('parentName').value.trim();
      const note = document.getElementById('note').value.trim();
      const selectedPractices = getSelectedPractices();

      if (selectedPractices.length === 0) {
        setStatus('対象練習を1つ以上選択してください');
        return;
      }

      if (!childName) {
        setStatus('子ども氏名を入力してください');
        return;
      }

      if (!parentName) {
        setStatus('保護者氏名を入力してください');
        return;
      }

      saveNames();
      submitBtn.disabled = true;
      setStatus(`送信中です...（${selectedPractices.length}件）`);

      try {
        for (const practice of selectedPractices) {
          const payload = {
            lineUserId: LINE_USER_ID,
            practiceId: practice.practiceId,
            practiceDate: practice.practiceDate,
            practiceLabel: practice.practiceLabel,
            childName: childName,
            parentName: parentName,
            note: note,
            submittedAt: new Date().toISOString()
          };

          await postOnePractice(payload);
        }

        document.getElementById('formView').classList.add('hidden');
        document.getElementById('successView').classList.remove('hidden');
        document.getElementById('successText').innerHTML =
          `<span class="success-text-line">${selectedPractices.length}件のお申し込みを受け付けました。</span>` +
          `<span class="success-text-line">当日お気をつけてお越し下さい。</span>`;
        setStatus('');
      } catch (error) {
        setStatus(`送信エラー: ${error.message}`);
        submitBtn.disabled = false;
      }
    }

    async function resetFormView() {
      document.getElementById('successView').classList.add('hidden');
      document.getElementById('formView').classList.remove('hidden');
      document.getElementById('submitBtn').disabled = false;

      loadSavedNames();
      await loadViewerProfile();
      applyViewerProfileToInputs();

      setStatus('読み込み中です...');
      await Promise.all([
        loadPractices(),
        loadActiveSignupPracticeIds()
      ]);
      renderPracticeList();
      setStatus('画面の読み込みが完了しました。');
    }

    window.addEventListener('load', async () => {
      loadSavedNames();
      await loadViewerProfile();
      applyViewerProfileToInputs();

      setStatus('読み込み中です...');
      await Promise.all([
        loadPractices(),
        loadActiveSignupPracticeIds()
      ]);
      renderPracticeList();
      setStatus('画面の読み込みが完了しました。');
    });
  </script>
</body>
</html>
