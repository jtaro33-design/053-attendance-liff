<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会員申込フォーム</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
      font-size: 18px;
      background: #f7f9fc;
      color: #1f2937;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 26px;
      margin: 0 0 8px;
      text-align: center;
    }

    .sub {
      font-size: 15px;
      color: #4b5563;
      margin-bottom: 22px;
      text-align: center;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      box-sizing: border-box;
      font-size: 18px;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #ffffff;
    }

    .field textarea {
      min-height: 110px;
      resize: vertical;
    }

    .notice {
      margin: 20px 0;
      padding: 14px;
      background: #eff6ff;
      border-radius: 12px;
      font-size: 15px;
      color: #1e3a8a;
    }

    button {
      width: 100%;
      font-size: 18px;
      font-weight: 700;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #ffffff;
      cursor: pointer;
      margin-top: 10px;
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .secondary-button {
      background: #e5e7eb;
      color: #111827;
      max-width: 360px;
      margin: 18px auto 0;
      display: block;
    }

    .status {
      margin-top: 16px;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .hidden {
      display: none;
    }

    .success-box {
      text-align: center;
      padding: 28px 16px;
    }

    .success-title {
      font-size: 24px;
      line-height: 1.5;
      font-weight: 800;
      color: #065f46;
      margin-bottom: 16px;
    }

    .success-title-line,
    .success-text-line {
      display: block;
    }

    .success-text {
      font-size: 18px;
      color: #374151;
      line-height: 1.9;
      margin: 0 auto;
      max-width: 420px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="formView">
      <h1>会員申込フォーム</h1>
      <div class="sub">必要事項をご入力のうえ、お申し込みください</div>

      <div class="field">
        <label for="childName">子ども氏名</label>
        <input id="childName" type="text" placeholder="例）山田 太郎">
      </div>

      <div class="field">
        <label for="grade">学年</label>
        <select id="grade">
          <option value="">選択してください</option>
          <option value="小4">小4</option>
          <option value="小5">小5</option>
          <option value="小6">小6</option>
          <option value="中1">中1</option>
          <option value="中2">中2</option>
          <option value="中3">中3</option>
          <option value="その他">その他</option>
        </select>
      </div>

      <div class="field">
        <label for="parentName">保護者氏名</label>
        <input id="parentName" type="text" placeholder="例）山田 花子">
      </div>

      <div class="field">
        <label for="phone">電話番号</label>
        <input id="phone" type="tel" placeholder="例）09012345678">
      </div>

      <div class="field">
        <label for="email">メールアドレス</label>
        <input id="email" type="email" placeholder="例）sample@example.com">
      </div>

      <div class="field">
        <label for="affiliation">所属</label>
        <input id="affiliation" type="text" placeholder="例）〇〇小学校 / 〇〇ミニバス">
      </div>

      <div class="field">
        <label for="desiredCategory">希望区分</label>
        <select id="desiredCategory">
          <option value="">選択してください</option>
          <option value="クラブ希望">クラブ希望</option>
          <option value="スクール希望">スクール希望</option>
          <option value="相談したい">相談したい</option>
        </select>
      </div>

      <div class="field">
        <label for="trialStatus">無料体験利用状況</label>
        <select id="trialStatus">
          <option value="">選択してください</option>
          <option value="未利用">未利用</option>
          <option value="利用済み">利用済み</option>
          <option value="不明">不明</option>
        </select>
      </div>

      <div class="field">
        <label for="note">相談・備考（任意）</label>
        <textarea id="note" placeholder="相談したいこと、現状、質問など"></textarea>
      </div>

      <div class="notice">
        ・入力内容を確認のうえ、管理者側で確認します<br>
        ・承認完了後、必要に応じてこちらからご連絡します
      </div>

      <button id="submitBtn" onclick="submitMemberApplication()">この内容で申し込む</button>
      <div id="status" class="status"></div>
    </div>

    <div id="successView" class="hidden">
      <div class="success-box">
        <div class="success-title">
          <span class="success-title-line">会員申込</span>
          <span class="success-title-line">ありがとうございます！</span>
        </div>
        <div id="successText" class="success-text"></div>
        <button class="secondary-button" onclick="resetFormView()">戻る</button>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyg0g1BMLA8HIVB13iyN4IbEcG7rOKG8m5NzUNl7a9U_ovSGno5c7pd1Vd7Woqo8brf/exec';

    function setStatus(message) {
      document.getElementById('status').textContent = message;
    }

    function saveInputCache() {
      localStorage.setItem('member_childName', document.getElementById('childName').value.trim());
      localStorage.setItem('member_parentName', document.getElementById('parentName').value.trim());
      localStorage.setItem('member_phone', document.getElementById('phone').value.trim());
      localStorage.setItem('member_email', document.getElementById('email').value.trim());
      localStorage.setItem('member_affiliation', document.getElementById('affiliation').value.trim());
      localStorage.setItem('member_grade', document.getElementById('grade').value);
      localStorage.setItem('member_desiredCategory', document.getElementById('desiredCategory').value);
      localStorage.setItem('member_trialStatus', document.getElementById('trialStatus').value);
      localStorage.setItem('member_note', document.getElementById('note').value.trim());
    }

    function loadInputCache() {
      document.getElementById('childName').value = localStorage.getItem('member_childName') || '';
      document.getElementById('parentName').value = localStorage.getItem('member_parentName') || '';
      document.getElementById('phone').value = localStorage.getItem('member_phone') || '';
      document.getElementById('email').value = localStorage.getItem('member_email') || '';
      document.getElementById('affiliation').value = localStorage.getItem('member_affiliation') || '';
      document.getElementById('grade').value = localStorage.getItem('member_grade') || '';
      document.getElementById('desiredCategory').value = localStorage.getItem('member_desiredCategory') || '';
      document.getElementById('trialStatus').value = localStorage.getItem('member_trialStatus') || '';
      document.getElementById('note').value = localStorage.getItem('member_note') || '';
    }

    function submitByForm(payload) {
      return new Promise((resolve) => {
        const iframeName = 'hiddenMemberApplicationFrame_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
        const iframe = document.createElement('iframe');
        iframe.name = iframeName;
        iframe.style.display = 'none';
        document.body.appendChild(iframe);

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = WEB_APP_URL;
        form.target = iframeName;
        form.style.display = 'none';

        Object.keys(payload).forEach((key) => {
          const input = document.createElement('input');
          input.type = 'hidden';
          input.name = key;
          input.value = payload[key];
          form.appendChild(input);
        });

        document.body.appendChild(form);
        form.submit();

        setTimeout(() => {
          form.remove();
          iframe.remove();
          resolve(true);
        }, 1400);
      });
    }

    async function submitMemberApplication() {
      const submitBtn = document.getElementById('submitBtn');

      const childName = document.getElementById('childName').value.trim();
      const grade = document.getElementById('grade').value;
      const parentName = document.getElementById('parentName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const affiliation = document.getElementById('affiliation').value.trim();
      const desiredCategory = document.getElementById('desiredCategory').value;
      const trialStatus = document.getElementById('trialStatus').value;
      const note = document.getElementById('note').value.trim();

      if (!childName) {
        setStatus('子ども氏名を入力してください');
        return;
      }
      if (!grade) {
        setStatus('学年を選択してください');
        return;
      }
      if (!parentName) {
        setStatus('保護者氏名を入力してください');
        return;
      }
      if (!phone) {
        setStatus('電話番号を入力してください');
        return;
      }
      if (!email) {
        setStatus('メールアドレスを入力してください');
        return;
      }
      if (!desiredCategory) {
        setStatus('希望区分を選択してください');
        return;
      }
      if (!trialStatus) {
        setStatus('無料体験利用状況を選択してください');
        return;
      }

      submitBtn.disabled = true;
      saveInputCache();
      setStatus('送信中です...');

      try {
        const payload = {
          formType: 'memberApplication',
          childName,
          grade,
          parentName,
          phone,
          email,
          affiliation,
          desiredCategory,
          appliedAt: new Date().toISOString(),
          lineUserId: localStorage.getItem('lineUserId') || '',
          trialStatus,
          note
        };

        await submitByForm(payload);

        document.getElementById('formView').classList.add('hidden');
        document.getElementById('successView').classList.remove('hidden');
        document.getElementById('successText').innerHTML =
          `<span class="success-text-line">お申し込みありがとうございます。</span>` +
          `<span class="success-text-line">承認までしばらくお待ちください。</span>`;
        setStatus('');
      } catch (error) {
        setStatus(`送信エラー: ${error.message}`);
        submitBtn.disabled = false;
      }
    }

    function resetFormView() {
      document.getElementById('successView').classList.add('hidden');
      document.getElementById('formView').classList.remove('hidden');
      document.getElementById('submitBtn').disabled = false;
      setStatus('画面の読み込みが完了しました。');
    }

    window.addEventListener('load', () => {
      loadInputCache();
      setStatus('画面の読み込みが完了しました。');
    });
  </script>
</body>
</html>
