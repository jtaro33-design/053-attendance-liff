<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無料体験申込</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
      font-size: 18px;
      background: #f7f9fc;
      color: #1f2937;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 24px;
      margin: 0 0 8px;
      text-align: center;
    }

    .sub {
      font-size: 15px;
      color: #4b5563;
      margin-bottom: 20px;
      text-align: center;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin: 20px 0 10px;
    }

    .back-to-menu {
      display: block;
      text-align: center;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 10px;
      background: #f1f5f9;
      color: #475569;
      border: 1px solid #e2e8f0;
      margin-bottom: 18px;
    }

    .viewer-box {
      margin: 0 0 18px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #374151;
    }

    .notice {
      margin: 20px 0;
      padding: 14px;
      background: #eff6ff;
      border-radius: 12px;
      font-size: 15px;
      color: #1e3a8a;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      box-sizing: border-box;
      font-size: 18px;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #ffffff;
    }

    .field textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      width: 100%;
      font-size: 18px;
      font-weight: 700;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #ffffff;
      cursor: pointer;
      margin-top: 10px;
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .secondary-button {
      background: #e5e7eb;
      color: #111827;
      max-width: 360px;
      margin: 18px auto 0;
      display: block;
    }

    .status {
      margin-top: 16px;
      font-size: 15px;
      white-space: pre-wrap;
      color: #b91c1c;
    }

    .hidden {
      display: none;
    }

    .success-box {
      text-align: center;
      padding: 28px 16px;
    }

    .success-title {
      font-size: 24px;
      line-height: 1.5;
      font-weight: 800;
      color: #065f46;
      margin-bottom: 16px;
    }

    .success-text {
      font-size: 18px;
      color: #374151;
      line-height: 1.9;
      margin: 0 auto;
      max-width: 420px;
    }

    .success-title-line,
    .success-text-line {
      display: block;
    }

    .calendar-wrapper {
      margin-bottom: 18px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      background: #ffffff;
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #f1f5f9;
      border-bottom: 1px solid #e2e8f0;
    }

    .calendar-header-title {
      font-size: 16px;
      font-weight: 700;
      color: #1f2937;
    }

    .calendar-nav-btn {
      width: auto;
      background: none;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 14px;
      font-weight: 700;
      color: #475569;
      cursor: pointer;
      margin: 0;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .calendar-dow {
      font-size: 13px;
      font-weight: 700;
      padding: 8px 0 4px;
      color: #6b7280;
      background: #f8fafc;
    }

    .calendar-dow:first-child {
      color: #dc2626;
    }

    .calendar-dow:last-child {
      color: #2563eb;
    }

    .calendar-cell {
      padding: 6px 2px;
      font-size: 14px;
      cursor: default;
      position: relative;
      min-height: 42px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .calendar-cell.empty {
      background: transparent;
    }

    .calendar-cell.has-practice {
      cursor: pointer;
      font-weight: 700;
    }

    .calendar-cell.has-practice:hover {
      background: #eff6ff;
    }

    .calendar-cell.today .cal-day-num {
      background: #dbeafe;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      line-height: 28px;
      display: inline-block;
    }

    .calendar-cell.selected {
      background: #2563eb;
      color: #ffffff;
    }

    .calendar-cell.selected .cal-day-num {
      background: transparent;
      color: #ffffff;
    }

    .cal-dots {
      display: flex;
      gap: 3px;
      margin-top: 2px;
      justify-content: center;
    }

    .cal-dot-practice {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2563eb;
    }

    .calendar-legend {
      display: flex;
      gap: 14px;
      justify-content: center;
      padding: 6px 12px 8px;
      font-size: 12px;
      color: #6b7280;
      border-top: 1px solid #f1f5f9;
    }

    .calendar-legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .legend-dot-practice {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2563eb;
    }

    .calendar-filter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #eff6ff;
      border-top: 1px solid #e2e8f0;
      font-size: 14px;
      color: #1e3a8a;
    }

    .calendar-clear-btn {
      width: auto;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      cursor: pointer;
      margin: 0;
    }

    .practice-option {
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      background: #ffffff;
    }

    .practice-option label {
      display: flex;
      align-items: flex-start;
      cursor: pointer;
      gap: 10px;
    }

    .practice-option input[type="radio"] {
      transform: scale(1.3);
      margin-top: 4px;
      flex-shrink: 0;
    }

    .practice-meta {
      font-size: 16px;
    }

    .practice-option.selected-card {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .no-practice-msg {
      padding: 14px;
      text-align: center;
      font-size: 15px;
      color: #6b7280;
      border: 1px dashed #d1d5db;
      border-radius: 12px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="formView">
      <a href="./entry_select.html" class="back-to-menu">← メインメニューへ戻る</a>

      <h1>無料体験申込</h1>
      <div class="sub">通常練習の中から希望日を選んでお申し込みください</div>

      <div id="viewerBox" class="viewer-box">LINE連携情報を確認中です...</div>

      <div class="field">
        <label for="childName">子ども氏名</label>
        <input id="childName" type="text" placeholder="例）山田 太郎">
      </div>

      <div class="field">
        <label for="grade">学年</label>
        <select id="grade">
          <option value="">選択してください</option>
          <option value="小4">小4</option>
          <option value="小5">小5</option>
          <option value="小6">小6</option>
          <option value="中1">中1</option>
          <option value="中2">中2</option>
          <option value="中3">中3</option>
          <option value="その他">その他</option>
        </select>
      </div>

      <div class="field">
        <label for="teamName">所属チーム</label>
        <input id="teamName" type="text" placeholder="例）〇〇ミニバス / 〇〇中学校">
      </div>

      <div class="field">
        <label for="parentName">保護者氏名</label>
        <input id="parentName" type="text" placeholder="例）山田 花子">
      </div>

      <div class="notice">
        無料体験はお一人様1回までです。<br>
        お申し込み後、内容確認のうえ管理者承認後にご案内します。
      </div>

      <div id="calendarWrapper" class="calendar-wrapper hidden">
        <div class="calendar-header">
          <button type="button" class="calendar-nav-btn" onclick="changeCalendarMonth(-1)">◀ 前月</button>
          <span id="calendarTitle" class="calendar-header-title"></span>
          <button type="button" class="calendar-nav-btn" onclick="changeCalendarMonth(1)">次月 ▶</button>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
        <div class="calendar-legend">
          <span class="calendar-legend-item"><span class="legend-dot-practice"></span> 通常練習あり</span>
        </div>
        <div id="calendarFilterBar" class="calendar-filter-bar hidden">
          <span id="calendarFilterLabel"></span>
          <button type="button" class="calendar-clear-btn" onclick="clearCalendarDateFilter()">全日程表示</button>
        </div>
      </div>

      <div class="section-title">希望練習日</div>
      <div id="practiceList"></div>

      <button id="submitBtn" onclick="submitTrialApplication()">この内容で申し込む</button>
      <div id="status" class="status"></div>
    </div>

    <div id="successView" class="hidden">
      <div class="success-box">
        <div class="success-title">
          <span class="success-title-line">無料体験のお申し込み</span>
          <span class="success-title-line">ありがとうございます！</span>
        </div>
        <div id="successText" class="success-text"></div>
        <button class="secondary-button" onclick="resetFormView()">戻る</button>
        <a href="./entry_select.html" class="secondary-button" style="text-decoration:none; text-align:center;">メインメニューへ戻る</a>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyg0g1BMLA8HIVB13iyN4IbEcG7rOKG8m5NzUNl7a9U_ovSGno5c7pd1Vd7Woqo8brf/exec';
    const LINE_USER_ID = localStorage.getItem('lineUserId') || '';

    let practices = [];
    let viewerProfile = {
      found: false,
      childName: '',
      parentName: '',
      category: '一般'
    };
    let currentCalendarMonth = null;
    let selectedPracticeDate = '';

    function normalizeId(id) {
      return String(id || '').replace(/-/g, '').trim();
    }

    function setStatus(message) {
      document.getElementById('status').textContent = message;
    }

    function setViewerBox() {
      const viewerBox = document.getElementById('viewerBox');

      if (LINE_USER_ID) {
        viewerBox.textContent =
          'LINE連携済みです。\n' +
          '無料体験は1回までのお申し込みとなります。';
      } else {
        viewerBox.textContent =
          'LINE userID が未取得です。\n' +
          'この状態だと無料体験申込は通りません。';
      }
    }

    function formatDateShort(dateString) {
      if (!dateString) return '';
      const d = new Date(dateString + 'T00:00:00');
      if (isNaN(d.getTime())) return dateString;

      return new Intl.DateTimeFormat('ja-JP', {
        timeZone: 'Asia/Tokyo',
        month: 'numeric',
        day: 'numeric',
        weekday: 'short'
      }).format(d);
    }

    function buildPracticeLabel(practice) {
      const parts = [];
      const dateLabel = formatDateShort(practice.date);
      if (dateLabel) parts.push(dateLabel);
      if (practice.startTime || practice.endTime) {
        parts.push((practice.startTime || '') + (practice.startTime && practice.endTime ? '〜' : '') + (practice.endTime || ''));
      }
      if (practice.place) parts.push(practice.place);
      if (practice.title) parts.push(practice.title);
      return parts.join('｜');
    }

    function loadSavedInputs() {
      document.getElementById('childName').value = localStorage.getItem('trial_childName') || '';
      document.getElementById('grade').value = localStorage.getItem('trial_grade') || '';
      document.getElementById('teamName').value = localStorage.getItem('trial_teamName') || '';
      document.getElementById('parentName').value = localStorage.getItem('trial_parentName') || '';
    }

    function saveInputs() {
      localStorage.setItem('trial_childName', document.getElementById('childName').value.trim());
      localStorage.setItem('trial_grade', document.getElementById('grade').value);
      localStorage.setItem('trial_teamName', document.getElementById('teamName').value.trim());
      localStorage.setItem('trial_parentName', document.getElementById('parentName').value.trim());
    }

    async function fetchJsonWithTimeout(url, timeoutMs) {
      const controller = new AbortController();
      const timerId = setTimeout(function() {
        controller.abort();
      }, timeoutMs);

      try {
        const response = await fetch(url, {
          method: 'GET',
          signal: controller.signal,
          cache: 'no-store'
        });
        return await response.json();
      } finally {
        clearTimeout(timerId);
      }
    }

    async function loadViewerProfile() {
      if (!LINE_USER_ID) {
        setViewerBox();
        return;
      }

      try {
        const result = await fetchJsonWithTimeout(
          WEB_APP_URL + '?mode=viewerProfile&lineUserId=' + encodeURIComponent(LINE_USER_ID) + '&t=' + Date.now(),
          8000
        );

        if (result.ok) {
          viewerProfile = {
            found: !!result.found,
            childName: result.childName || '',
            parentName: result.parentName || '',
            category: result.category || '一般'
          };
        }
      } catch (error) {}

      if (viewerProfile.childName && !document.getElementById('childName').value) {
        document.getElementById('childName').value = viewerProfile.childName;
      }
      if (viewerProfile.parentName && !document.getElementById('parentName').value) {
        document.getElementById('parentName').value = viewerProfile.parentName;
      }

      setViewerBox();
    }

    async function loadPractices() {
      try {
        const result = await fetchJsonWithTimeout(
          WEB_APP_URL +
            '?mode=publicPractices' +
            '&lineUserId=' + encodeURIComponent(LINE_USER_ID) +
            '&t=' + Date.now(),
          10000
        );

        if (result.ok && Array.isArray(result.items)) {
          practices = result.items.filter(function(item) {
            return item.title === '通常練習';
          });
        } else {
          practices = [];
        }
      } catch (error) {
        practices = [];
      }
    }

    function renderPracticeList() {
      let displayPractices = practices;
      if (selectedPracticeDate) {
        displayPractices = practices.filter(function(p) {
          return p.date === selectedPracticeDate;
        });
      }

      const container = document.getElementById('practiceList');
      container.innerHTML = '';

      if (!Array.isArray(displayPractices) || displayPractices.length === 0) {
        if (selectedPracticeDate) {
          container.innerHTML = '<div class="no-practice-msg">この日に選択できる通常練習はありません</div>';
        } else {
          container.innerHTML = '<div class="no-practice-msg">現在、選択できる通常練習はありません</div>';
        }
        return;
      }

      const selectedRadio = document.querySelector('input[name="trialPractice"]:checked');
      const selectedId = selectedRadio ? selectedRadio.value : '';

      displayPractices.forEach(function(practice) {
        const normalizedPracticeId = normalizeId(practice.id);
        const displayLabel = buildPracticeLabel(practice);
        const wrapper = document.createElement('div');
        wrapper.className = 'practice-option' + (selectedId === normalizedPracticeId ? ' selected-card' : '');

        wrapper.innerHTML = `
          <label>
            <input
              type="radio"
              name="trialPractice"
              value="${normalizedPracticeId}"
              data-date="${practice.date || ''}"
              data-label="${displayLabel}"
              onchange="refreshSelectedPracticeCard()"
            >
            <div class="practice-meta">
              <div>${displayLabel}</div>
            </div>
          </label>
        `;

        container.appendChild(wrapper);
      });

      const checked = Array.from(document.querySelectorAll('input[name="trialPractice"]')).find(function(r) {
        return r.value === selectedId;
      });
      if (checked) {
        checked.checked = true;
        refreshSelectedPracticeCard();
      }
    }

    function refreshSelectedPracticeCard() {
      document.querySelectorAll('.practice-option').forEach(function(el) {
        el.classList.remove('selected-card');
      });

      const checked = document.querySelector('input[name="trialPractice"]:checked');
      if (checked) {
        const card = checked.closest('.practice-option');
        if (card) card.classList.add('selected-card');
      }
    }

    function getSelectedPractice() {
      const selected = document.querySelector('input[name="trialPractice"]:checked');
      if (!selected) return null;

      return {
        practiceId: normalizeId(selected.value),
        practiceDate: selected.dataset.date,
        practiceLabel: selected.dataset.label
      };
    }

    function getPracticeDateSet() {
      const set = {};
      practices.forEach(function(p) {
        if (p.date) set[p.date] = true;
      });
      return set;
    }

    function toDateStr(year, month, day) {
      return year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
    }

    function getTodayStr() {
      const now = new Date();
      return toDateStr(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function renderCalendar() {
      if (!currentCalendarMonth) {
        const now = new Date();
        currentCalendarMonth = new Date(now.getFullYear(), now.getMonth(), 1);
      }

      const year = currentCalendarMonth.getFullYear();
      const month = currentCalendarMonth.getMonth();

      document.getElementById('calendarTitle').textContent = year + '年 ' + (month + 1) + '月';

      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      const dows = ['日', '月', '火', '水', '木', '金', '土'];
      dows.forEach(function(d) {
        const cell = document.createElement('div');
        cell.className = 'calendar-dow';
        cell.textContent = d;
        grid.appendChild(cell);
      });

      const firstDow = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const dateSet = getPracticeDateSet();
      const todayStr = getTodayStr();

      for (let i = 0; i < firstDow; i++) {
        const empty = document.createElement('div');
        empty.className = 'calendar-cell empty';
        grid.appendChild(empty);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = toDateStr(year, month, day);
        const cell = document.createElement('div');
        const classes = ['calendar-cell'];

        const hasPractice = !!dateSet[dateStr];
        if (hasPractice) classes.push('has-practice');
        if (dateStr === todayStr) classes.push('today');
        if (dateStr === selectedPracticeDate) classes.push('selected');

        cell.className = classes.join(' ');

        const numSpan = document.createElement('span');
        numSpan.className = 'cal-day-num';
        numSpan.textContent = day;
        cell.appendChild(numSpan);

        if (hasPractice) {
          const dotsContainer = document.createElement('span');
          dotsContainer.className = 'cal-dots';
          const dot = document.createElement('span');
          dot.className = 'cal-dot-practice';
          dotsContainer.appendChild(dot);
          cell.appendChild(dotsContainer);

          cell.setAttribute('data-date', dateStr);
          cell.addEventListener('click', function() {
            selectCalendarDate(this.getAttribute('data-date'));
          });
        }

        grid.appendChild(cell);
      }

      document.getElementById('calendarWrapper').classList.remove('hidden');
    }

    function changeCalendarMonth(offset) {
      if (!currentCalendarMonth) {
        const now = new Date();
        currentCalendarMonth = new Date(now.getFullYear(), now.getMonth(), 1);
      }

      currentCalendarMonth = new Date(
        currentCalendarMonth.getFullYear(),
        currentCalendarMonth.getMonth() + offset,
        1
      );

      renderCalendar();
    }

    function selectCalendarDate(dateStr) {
      if (selectedPracticeDate === dateStr) {
        clearCalendarDateFilter();
        return;
      }

      selectedPracticeDate = dateStr;
      renderCalendar();
      renderPracticeList();

      const filterBar = document.getElementById('calendarFilterBar');
      const filterLabel = document.getElementById('calendarFilterLabel');
      filterBar.classList.remove('hidden');
      filterLabel.textContent = formatDateShort(dateStr) + ' の通常練習を表示中';
    }

    function clearCalendarDateFilter() {
      selectedPracticeDate = '';
      renderCalendar();
      renderPracticeList();
      document.getElementById('calendarFilterBar').classList.add('hidden');
    }

    async function submitTrialPayload(payload) {
      const body = new URLSearchParams();

      Object.keys(payload).forEach(function(key) {
        body.append(key, payload[key]);
      });

      const response = await fetch(WEB_APP_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
        },
        body: body.toString()
      });

      const result = await response.json();
      return result;
    }

    async function submitTrialApplication() {
      const submitBtn = document.getElementById('submitBtn');
      const childName = document.getElementById('childName').value.trim();
      const grade = document.getElementById('grade').value;
      const teamName = document.getElementById('teamName').value.trim();
      const parentName = document.getElementById('parentName').value.trim();
      const selectedPractice = getSelectedPractice();

      if (!LINE_USER_ID) {
        setStatus('LINE userID が取得できていません。リッチメニューから入り直してください。');
        return;
      }

      if (!childName) {
        setStatus('子ども氏名を入力してください');
        return;
      }

      if (!grade) {
        setStatus('学年を選択してください');
        return;
      }

      if (!teamName) {
        setStatus('所属チームを入力してください');
        return;
      }

      if (!parentName) {
        setStatus('保護者氏名を入力してください');
        return;
      }

      if (!selectedPractice) {
        setStatus('希望練習日を1つ選択してください');
        return;
      }

      saveInputs();
      submitBtn.disabled = true;
      setStatus('送信中です...');

      try {
        const payload = {
          formType: 'trialApplication',
          childName: childName,
          grade: grade,
          teamName: teamName,
          parentName: parentName,
          lineUserId: LINE_USER_ID,
          requestedPracticeId: selectedPractice.practiceId,
          requestedPracticeDate: selectedPractice.practiceDate,
          requestedPracticeLabel: selectedPractice.practiceLabel,
          appliedAt: new Date().toISOString()
        };

        const result = await submitTrialPayload(payload);

        if (!result || !result.ok) {
          setStatus(result && result.message ? result.message : '送信エラーが発生しました。');
          submitBtn.disabled = false;
          return;
        }

        document.getElementById('formView').classList.add('hidden');
        document.getElementById('successView').classList.remove('hidden');
        document.getElementById('successText').innerHTML =
          '<span class="success-text-line">無料体験のお申し込みを受け付けました。</span>' +
          '<span class="success-text-line">内容確認後、改めてご案内します。</span>';
        setStatus('');
      } catch (error) {
        setStatus('送信エラー: ' + error.message);
        submitBtn.disabled = false;
      }
    }

    async function initPage() {
      loadSavedInputs();

      setStatus('LINE連携情報を確認中です...');
      await loadViewerProfile();

      setStatus('通常練習情報を読み込み中です...');
      await loadPractices();

      renderPracticeList();
      renderCalendar();
      setStatus('');
    }

    async function resetFormView() {
      document.getElementById('successView').classList.add('hidden');
      document.getElementById('formView').classList.remove('hidden');
      document.getElementById('submitBtn').disabled = false;
      selectedPracticeDate = '';
      document.getElementById('calendarFilterBar').classList.add('hidden');
      await initPage();
    }

    window.addEventListener('load', function() {
      initPage();
    });
  </script>
</body>
</html>
